<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#f0f4ff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Daily Tasks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg: #f0f4ff;
      --card: #ffffff;
      --accent: #4f46e5;
      --accent2: #818cf8;
      --legendary: #c4712d;
      --mythic: #b87ad7;
      --legendary2: #e08c50;
      --common: #999da6;
      --common-light: #f3f4f6;
      --text: #1e1b4b;
      --subtext: #6b7280;
      --border: #e0e7ff;
      --radius: 20px;
      --shadow: 0 2px 12px rgba(79,70,229,0.08);
    }
    body { background: var(--bg); color: var(--text); font-family: 'Fredoka', sans-serif; min-height: 100vh; max-width: 480px; margin: 0 auto; transition: background 0.45s ease; }
    body.mythic-bg { background: var(--mythic); }
    body.mythic-bg .tab-bar { background: var(--mythic); border-top-color: rgba(255,255,255,0.2); transition: background 0.45s ease; }
    body.mythic-bg .tab-btn { color: rgba(255,255,255,0.6); }
    body.mythic-bg .tab-btn.active { color: #fff; }
    body.mythic-bg .section-sub,
    body.mythic-bg .pick-count,
    body.mythic-bg .task-desc,
    body.mythic-bg .btn-ghost { color: rgba(255,255,255,0.75); }
    body.mythic-bg .pick-count strong { color: #fff; }

    .tab-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: #fff; border-top: 1px solid var(--border); display: flex; align-items: flex-end; z-index: 100; padding: 0 12px calc(16px + env(safe-area-inset-bottom)) 12px; box-shadow: 0 -2px 12px rgba(0,0,0,0.05); overflow: visible; }
    .tab-btn { flex: 1; padding: 12px 8px; background: none; border: none; color: var(--subtext); font-size: 0.72rem; font-weight: 600; font-family: inherit; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; transition: color 0.15s; }
    .tab-icon { font-size: 1.4rem; line-height: 1; }
    .tab-btn.active { color: var(--accent); }

    .content { padding: 0 20px calc(120px + env(safe-area-inset-bottom)) 20px; }

    /* Buttons */
    .btn-primary { width: 100%; padding: 17px; background: var(--accent); color: #fff; font-weight: 700; font-size: 1.05rem; letter-spacing: 0.04em; border: none; border-radius: var(--radius); cursor: pointer; font-family: inherit; box-shadow: 0 4px 16px rgba(79,70,229,0.3); transition: transform 0.1s; touch-action: manipulation; }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.4; pointer-events: none; }
    .btn-ghost { width: 100%; padding: 14px; background: none; color: var(--subtext); font-size: 0.9rem; font-weight: 600; border: none; cursor: pointer; font-family: inherit; margin-top: 4px; }
    .btn-danger-ghost { width: 100%; padding: 14px; background: none; color: #ef4444; font-size: 0.88rem; font-weight: 600; border: none; cursor: pointer; font-family: inherit; margin-top: 4px; }

    /* Points bar */
    .points-bar { display: flex; gap: 10px; margin-bottom: 28px; }
    .points-card { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 14px; text-align: center; box-shadow: var(--shadow); position: relative; }
    .points-val { font-size: 2rem; font-weight: 700; line-height: 1; }
    .points-val.common { color: var(--common); }
    .points-val.legendary { color: var(--legendary); }
    .points-val.mythic { color: var(--mythic); }
    .points-label { font-size: 0.68rem; color: var(--subtext); font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; margin-top: 4px; }

    /* Task option cards (pick screen) */
    .task-card { background: var(--card); border: 2px solid #d1d5db; border-radius: var(--radius); padding: 16px 18px; margin-bottom: 10px; cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s, transform 0.1s; box-shadow: var(--shadow); position: relative; }
    .task-card:active { transform: scale(0.98); }
    .task-card.selected { border-color: #9ca3af; box-shadow: 0 0 0 1px #9ca3af, var(--shadow); }
    /* ── Legendary glow via ::before so it always sits behind card backgrounds ── */
    @keyframes legendary-breathe {
      0%, 100% { box-shadow: 0 0 18px 6px rgba(196,113,45,0.4); }
      50%       { box-shadow: 0 0 28px 10px rgba(196,113,45,0.8); }
    }
    .legendary-glow::before,
    .task-card.legendary-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      z-index: -1;
      animation: legendary-breathe var(--glow-duration, 2400ms) ease-in-out infinite;
      animation-delay: var(--glow-delay, 0ms);
    }
    .legendary-glow { }
    .task-card.legendary-card { border: 2px solid rgba(196,113,45,0.35); }
    .task-card.legendary-card.selected { border-color: var(--legendary); box-shadow: 0 0 0 1px var(--legendary), var(--shadow); }
    .task-card.legendary-card.selected::before { animation: none; box-shadow: 0 0 28px 10px rgba(196,113,45,0.8); }
    .task-card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }
    .task-title { font-size: 1.05rem; font-weight: 700; }
    .task-badge { font-size: 0.62rem; font-weight: 700; padding: 3px 9px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.07em; flex-shrink: 0; }
    .badge-common { background: var(--common-light); color: #6d727f; }
    .badge-legendary { background: #fce8d4; color: #6d3a11; }
    .task-desc { font-size: 0.84rem; color: var(--subtext); }

    /* Active task list */
    .active-task { background: var(--card); border: 2px solid var(--border); border-radius: var(--radius); padding: 16px 18px; margin-bottom: 10px; cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s; box-shadow: var(--shadow); position: relative; }
    .active-task.confirming { border-color: #9ca3af; box-shadow: 0 0 0 1px #9ca3af, var(--shadow); }
    .active-task.confirming.type-legendary { border-color: var(--legendary); box-shadow: 0 0 0 1px var(--legendary), var(--shadow); }
    .active-task.confirming.type-legendary::before { animation: none; box-shadow: 0 0 28px 10px rgba(196,113,45,0.8); }
    .active-task.completed { cursor: default; animation: none !important; transition: none; }
    .active-task.completed.type-common    { background: var(--common);    border-color: var(--common);    color: #fff; }
    .active-task.completed.type-legendary { background: var(--legendary); border-color: var(--legendary); color: #fff; }
    .active-task.completed .active-task-desc { color: rgba(255,255,255,0.7); }
    .active-task.completed.type-legendary .task-badge { background: rgba(109,58,17,1); color: #fff; }
    .active-task.completed.type-common    .task-badge { background: rgba(109,114,127,1); color: #fff; }
    .active-task-row { display: flex; align-items: center; gap: 14px; }
    .active-task-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .dot-common { background: var(--common); }
    .dot-legendary { background: var(--legendary); }
    .active-task-check { width: 24px; height: 24px; border-radius: 50%; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; flex-shrink: 0; }
    .type-legendary .active-task-check { background: rgba(109,58,17,1); }
    .type-common    .active-task-check { background: rgba(109,114,127,1); }
    .active-task-info { flex: 1; }
    .active-task-title { font-size: 1rem; font-weight: 700; }
    .active-task-desc { font-size: 0.82rem; color: var(--subtext); margin-top: 2px; }
    .task-confirm { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .task-confirm-text { font-size: 0.88rem; font-weight: 600; color: var(--text); }
    .btn-confirm-yes { background: #22c55e; color: #fff; border: none; border-radius: 10px; padding: 8px 18px; font-size: 0.88rem; font-weight: 700; cursor: pointer; font-family: inherit; }
    .btn-confirm-no  { background: none; border: 1px solid var(--border); border-radius: 10px; padding: 8px 18px; font-size: 0.88rem; font-weight: 600; cursor: pointer; font-family: inherit; color: var(--subtext); }

    /* Review */
    .review-task { background: var(--card); border: 2px solid var(--border); border-radius: var(--radius); padding: 16px 18px; margin-bottom: 10px; display: flex; align-items: center; gap: 14px; cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s; box-shadow: var(--shadow); }
    .review-task.checked { border-color: #22c55e; box-shadow: 0 0 0 1px #22c55e, var(--shadow); }
    .review-checkbox { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 0.9rem; transition: all 0.15s; }
    .review-task.checked .review-checkbox { background: #22c55e; border-color: #22c55e; color: #fff; }
    .review-task-info { flex: 1; }
    .review-task-title { font-size: 1rem; font-weight: 700; }
    .review-task-sub { font-size: 0.82rem; color: var(--subtext); margin-top: 2px; }

    /* Warning */
    .warning-banner { background: #fef3c7; border: 1px solid #fde68a; border-radius: 14px; padding: 14px 16px; margin-bottom: 20px; display: flex; gap: 10px; align-items: flex-start; }
    .warning-text { font-size: 0.84rem; color: #92400e; font-weight: 600; line-height: 1.4; }

    /* Section headers */
    .section-header { padding: 48px 0 24px; }
    .section-title { font-size: 1.6rem; font-weight: 700; }
    .section-sub { font-size: 0.88rem; color: var(--subtext); margin-top: 4px; }

    /* Pick count */
    .pick-count { text-align: center; font-size: 0.88rem; color: var(--subtext); font-weight: 600; margin-bottom: 14px; }
    .pick-count strong { color: var(--accent); }
    .pick-count.mythic-pick strong { color: var(--mythic); text-shadow: 0 0 12px rgba(184,122,215,0.8), 0 0 28px rgba(184,122,215,0.4); }

    /* Home / active header */
    .home-header { padding: 52px 0 24px; text-align: center; }
    .home-emoji { font-size: 5.5rem; line-height: 1; margin-bottom: 12px; }
    .home-title { font-size: 1.8rem; font-weight: 700; }
    .home-sub { font-size: 0.9rem; color: var(--subtext); margin-top: 6px; }
    .tasks-label { font-size: 0.68rem; color: var(--subtext); font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; }

    /* Task pool tab */
    .pool-section-label { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; margin: 20px 0 8px; }
    .pool-section-label.label-common { color: #6d727f; }
    .pool-section-label.label-legendary { color: var(--legendary); }
    .pool-section-label.label-archived { color: var(--subtext); }
    .pool-task-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 8px; box-shadow: var(--shadow); position: relative; }
    .pool-task-card.card-common { border-color: rgba(109,114,127,0.35); }
    .pool-task-card.card-legendary { border-color: rgba(196,113,45,0.35); }
    .pool-task-card.card-archived { opacity: 0.55; }
    .pool-task-row { display: flex; align-items: center; gap: 10px; }
    .pool-task-info { flex: 1; min-width: 0; }
    .pool-task-title { font-size: 0.95rem; font-weight: 700; }
    .pool-task-desc { font-size: 0.8rem; color: var(--subtext); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pool-task-actions { display: flex; gap: 4px; flex-shrink: 0; }
    .btn-icon { background: none; border: none; cursor: pointer; font-size: 1rem; padding: 6px; border-radius: 8px; color: var(--subtext); transition: background 0.15s, color 0.15s; }
    .btn-icon:hover { background: var(--bg); }
    .btn-icon.del:hover { color: #ef4444; }
    .btn-icon.restore:hover { color: var(--common); }

    /* Delete confirmation inline */
    .delete-confirm { margin-top: 10px; padding: 10px 12px; background: #fee2e2; border-radius: 12px; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .delete-confirm-text { font-size: 0.84rem; font-weight: 700; color: #dc2626; }
    .btn-del-yes { background: #ef4444; color: #fff; border: none; border-radius: 10px; padding: 7px 16px; font-size: 0.84rem; font-weight: 700; cursor: pointer; font-family: inherit; }
    .btn-del-no  { background: none; border: 1px solid #fca5a5; border-radius: 10px; padding: 7px 14px; font-size: 0.84rem; font-weight: 600; cursor: pointer; font-family: inherit; color: #dc2626; }

    /* Task edit form */
    .task-edit-form { border-top: 1px solid var(--border); margin-top: 12px; padding-top: 12px; display: flex; flex-direction: column; gap: 8px; }
    .form-input { width: 100%; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 12px; font-family: inherit; font-size: 0.9rem; color: var(--text); background: var(--bg); outline: none; }
    .form-input:focus { border-color: var(--common); }
    .form-row { display: flex; gap: 8px; align-items: center; }
    .form-type-btn { flex: 1; padding: 8px; border: 1.5px solid var(--border); border-radius: 12px; font-family: inherit; font-size: 0.8rem; font-weight: 700; cursor: pointer; background: none; color: var(--subtext); }
    .form-type-btn.active-common { border-color: var(--common); background: var(--common-light); color: #6d727f; }
    .form-type-btn.active-legendary { border-color: var(--legendary); background: #fef3c7; color: var(--legendary); }
    .form-actions { display: flex; gap: 8px; margin-top: 4px; }
    .btn-save { flex: 1; padding: 10px; color: #fff; border: none; border-radius: 12px; font-family: inherit; font-size: 0.9rem; font-weight: 700; cursor: pointer; background: var(--border); opacity: 0.5; pointer-events: none; }
    .btn-save.save-common { background: var(--common); opacity: 1; pointer-events: auto; }
    .btn-save.save-legendary { background: var(--legendary); opacity: 1; pointer-events: auto; }
    .btn-cancel { padding: 10px 16px; background: none; border: 1px solid var(--border); border-radius: 12px; font-family: inherit; font-size: 0.9rem; cursor: pointer; color: var(--subtext); }
    .btn-add-task { width: 100%; padding: 14px; border: 2px dashed var(--border); border-radius: var(--radius); background: none; font-family: inherit; font-size: 0.9rem; font-weight: 600; color: var(--subtext); cursor: pointer; margin-bottom: 4px; transition: border-color 0.15s, color 0.15s; }
    .btn-add-task:hover { border-color: var(--common); color: var(--common); }

    /* New task card at top */
    .new-task-card { background: var(--card); border: 1.5px dashed var(--common); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 8px; box-shadow: var(--shadow); }
    .new-task-label { font-size: 0.88rem; font-weight: 700; color: #6d727f; margin-bottom: 4px; }

    /* History */
    .history-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 10px; box-shadow: var(--shadow); }
    .history-card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .history-date { font-size: 0.95rem; font-weight: 700; }
    .history-result { font-size: 0.7rem; font-weight: 700; padding: 3px 10px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.06em; }
    .result-win { background: #dcfce7; color: #16a34a; }
    .result-fail { background: #fee2e2; color: #dc2626; }
    .result-active { background: #e0e7ff; color: var(--accent); }
    .history-tasks { display: flex; flex-direction: column; gap: 6px; }
    .history-task-row { font-size: 0.84rem; display: flex; align-items: center; gap: 8px; color: var(--subtext); }
    .history-task-row.done { color: var(--text); font-weight: 600; }
    .history-pts { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); font-size: 0.8rem; color: var(--subtext); display: flex; gap: 12px; }
    .pts-earned { font-weight: 700; }
    .pts-common { color: var(--common); }
    .pts-legendary { color: var(--legendary); }
    .pts-mythic { color: var(--mythic); }

    @keyframes mythic-breathe {
      0%, 100% { box-shadow: 0 0 18px 6px rgba(184,122,215,0.4); }
      50%       { box-shadow: 0 0 28px 10px rgba(184,122,215,0.8); }
    }
    .mythic-glow::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      z-index: -1;
      animation: mythic-breathe var(--glow-duration, 2400ms) ease-in-out infinite;
      animation-delay: var(--glow-delay, 0ms);
    }
    .mythic-glow { }

    .loading { text-align: center; padding: 80px 20px; color: var(--subtext); font-size: 1rem; }
    .empty { text-align: center; padding: 60px 20px; color: var(--subtext); }
    .empty-emoji { font-size: 3rem; margin-bottom: 12px; }
  </style>
</head>
<body>
<div class="content" id="app"></div>
<div class="tab-bar">
  <button class="tab-btn" data-tab="tasks"><span class="tab-icon">📋</span><span>Tasks</span></button>
  <button class="tab-btn" data-tab="today"><span class="tab-icon">⚡</span><span>Today</span></button>
  <button class="tab-btn" data-tab="history"><span class="tab-icon">📜</span><span>History</span></button>
</div>
<script type="module">
  const CONNECTION_STRING = 'postgresql://neondb_owner:npg_ZpcMwu79JeSV@ep-noisy-tree-aq773vyi-pooler.c-8.us-east-1.aws.neon.tech/neondb?sslmode=require';
  const { neon } = await import('https://esm.sh/@neondatabase/serverless');
  const sql = neon(CONNECTION_STRING);

  /* ── Default task pool (seed data) ── */
  const DEFAULT_TASKS = [
    { id:'c1',  type:'common',    title:'Morning Walk',      description:'Take a 20-minute walk outside' },
    { id:'c2',  type:'common',    title:'Hydrate',           description:'Drink 8 glasses of water' },
    { id:'c3',  type:'common',    title:'Read',              description:'Read for at least 20 minutes' },
    { id:'c4',  type:'common',    title:'Meditate',          description:'10 minutes of mindfulness' },
    { id:'c5',  type:'common',    title:'Journal',           description:'Write 5 minutes in your journal' },
    { id:'c6',  type:'common',    title:'No Social Media',   description:'Avoid social media until noon' },
    { id:'c7',  type:'common',    title:'Exercise',          description:'Work out for 30 minutes' },
    { id:'c8',  type:'common',    title:'Healthy Breakfast', description:'Eat a nutritious breakfast' },
    { id:'c9',  type:'common',    title:'Connect',           description:'Reach out to someone you care about' },
    { id:'c10', type:'common',    title:'Early Bed',         description:'In bed before midnight' },
    { id:'l1',  type:'legendary', title:'The Fast',          description:'Complete a 16-hour fast' },
    { id:'l2',  type:'legendary', title:'Ice Bath',          description:'Take a cold shower or ice bath' },
    { id:'l3',  type:'legendary', title:'Deep Work',         description:'3 hours of uninterrupted focused work' },
  ];

  function getTask(id) { return s.tasks.find(t => t.id === id); }
  function getTaskForHistory(sess, id) {
    if (sess.task_snapshots?.length) {
      const snap = sess.task_snapshots.find(t => t.id === id);
      if (snap) return snap;
    }
    return getTask(id);
  }

  /* ── State ── */
  const s = {
    tab: 'today',
    loading: true,
    sessions: [],
    tasks: [],
    today: todayStr(),
    offered: [],
    picked: [],
    reviewChecked: [],
    confirmTask: null,
    editingTask: null,   // null | { id, title, description, type }  (id==='' → new)
    deletingTask: null,  // task id pending delete confirmation
    newTaskType: 'common',
  };

  function todayStr() { return new Date().toISOString().slice(0,10); }

  /* ── Screen logic ── */
  function getScreen() {
    if (s.loading) return 'loading';
    const pendingReview = s.sessions.find(x => x.date !== s.today && x.status === 'active');
    if (pendingReview) return 'review';
    const todaySess = s.sessions.find(x => x.date === s.today);
    if (!todaySess || todaySess.status === 'picking') return 'pick';
    return 'active';
  }

  /* ── Points ── */
  function computePoints() {
    let common = 0, legendary = 0, mythic = 0;
    for (const sess of s.sessions) {
      if (sess.status !== 'done') continue;
      if ((sess.picked_ids||[]).length === 5 && (sess.completed_ids||[]).length === 5) mythic++;
      for (const id of (sess.completed_ids || [])) {
        const t = getTaskForHistory(sess, id);
        if (t?.type === 'legendary') legendary++; else common++;
      }
    }
    return { common, legendary, mythic };
  }

  /* ── Helpers ── */
  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length-1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i+1));
      [a[i],a[j]] = [a[j],a[i]];
    }
    return a;
  }

  function fmtDate(str) {
    if (!str) return '';
    return new Date(str + 'T12:00:00').toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
  }

  function ensureOffered() {
    const todaySess = s.sessions.find(x => x.date === s.today);
    if (todaySess?.offered_ids?.length) {
      s.offered = todaySess.offered_ids;
    } else if (!s.offered.length) {
      const active = s.tasks.filter(t => !t.archived);
      s.offered = shuffle(active).slice(0, Math.min(5, active.length)).map(t => t.id);
    }
  }

  /* ── Render ── */
  const GLOW_START = Date.now();
  // Per-task duration: 2.0s – 3.2s, derived from ID
  function glowDuration(id) {
    let h = 0;
    for (const c of String(id)) h = ((h << 5) - h + c.charCodeAt(0) + 7) | 0;
    return 2000 + (Math.abs(h) % 1200);
  }

  // Returns a stable per-task phase offset so re-renders don't reset the animation
  function glowDelay(id) {
    let h = 0;
    for (const c of String(id)) h = ((h << 5) - h + c.charCodeAt(0)) | 0;
    const dur = glowDuration(id);
    const phase = Math.abs(h) % dur;
    const elapsed = (Date.now() - GLOW_START) % dur;
    return (phase + elapsed) % dur;
  }

  function render() {
    const screen = s.tab === 'history' ? 'history'
                 : s.tab === 'tasks'   ? 'tasks'
                 : getScreen();
    document.body.classList.toggle('mythic-bg', screen === 'pick' && s.picked.length === 5);
    document.getElementById('app').innerHTML = buildHtml(screen);
    document.querySelectorAll('.tab-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.tab === s.tab));
    // Sync per-task glow phases via CSS custom property (used by ::before)
    document.querySelectorAll('[data-glow-id]').forEach(el => {
      const id = el.dataset.glowId;
      el.style.setProperty('--glow-duration', `${glowDuration(id)}ms`);
      el.style.setProperty('--glow-delay', `-${glowDelay(id)}ms`);
    });
    bind(screen);
  }

  function buildHtml(screen) {
    if (screen === 'loading') return `<div class="loading">Loading…</div>`;
    if (screen === 'history') return htmlHistory();
    if (screen === 'tasks')   return htmlTaskPool();
    if (screen === 'review')  return htmlReview();
    if (screen === 'pick')    return htmlPick();
    return htmlActive();
  }

  /* ── Pick ── */
  function htmlPick() {
    ensureOffered();
    const tasks = s.offered.map(id => getTask(id)).filter(Boolean);
    const n = s.picked.length;
    return `
      <div class="section-header">
        <div class="section-title">Pick Your Tasks</div>
        <div class="section-sub">${fmtDate(s.today)}</div>
      </div>
      <div class="pick-count${n===5?' mythic-pick':''}">Selected: <strong>${n} / 3</strong></div>
      ${tasks.map((t, i) => `
        <div class="task-card${t.type==='legendary'?' legendary-card':''}${s.picked.includes(t.id)?' selected':''}" data-pick="${t.id}"${t.type==='legendary'?' data-glow-id="'+t.id+'"':''}${s.picked.length>=5&&!s.picked.includes(t.id)?' style="opacity:0.45;pointer-events:none"':''}>
          <div class="task-card-top">
            <div class="task-title">${t.title}</div>
            <span class="task-badge badge-${t.type}">${t.type}</span>
          </div>
          <div class="task-desc">${t.description}</div>
        </div>`).join('')}
      <div style="height:16px"></div>
      <button class="btn-primary" id="btn-start"${n<3?' disabled':''}>Start Day →</button>`;
  }

  /* ── Active ── */
  function htmlActive() {
    const todaySess = s.sessions.find(x => x.date === s.today);
    const tasks = (todaySess?.picked_ids || []).map(id => getTaskForHistory(todaySess, id)).filter(Boolean);
    const completedIds = todaySess?.completed_ids || [];
    const allDone = tasks.length > 0 && tasks.every(t => completedIds.includes(t.id));
    return `
      <div class="home-header">
        <div class="home-emoji">${allDone ? '🏆' : '⚡'}</div>
        <div class="home-title">${allDone ? 'All Done!' : 'Mission Active'}</div>
        <div class="home-sub">${allDone ? 'Great work today' : 'Tap a task to mark it complete'}</div>
      </div>
      <div class="tasks-label">Today's Tasks</div>
      ${tasks.map((t, i) => {
        const done = completedIds.includes(t.id);
        const confirming = s.confirmTask === t.id;
        const glowClass = t.type === 'legendary' && !done ? ' legendary-glow' : '';
        const glowIdAttr = t.type === 'legendary' && !done ? ` data-glow-id="${t.id}"` : '';
        const confirmingClass = confirming ? ' confirming' : '';
        return `
        <div class="active-task${done?' completed':''} type-${t.type}${glowClass}${confirmingClass}"${!done?` data-confirm-task="${t.id}" data-task-type="${t.type}"`:''} ${glowIdAttr}>
          <div class="active-task-row">
            ${done
              ? `<div class="active-task-check">✓</div>`
              : `<div class="active-task-dot dot-${t.type}"></div>`}
            <div class="active-task-info">
              <div class="active-task-title">${t.title}</div>
              <div class="active-task-desc">${t.description}</div>
            </div>
            <span class="task-badge badge-${t.type}">${t.type}</span>
          </div>
          ${confirming ? `
          <div class="task-confirm">
            <span class="task-confirm-text">Did you complete this?</span>
            <div style="display:flex;gap:8px">
              <button class="btn-confirm-no" data-confirm-no>No</button>
              <button class="btn-confirm-yes" data-confirm-yes="${t.id}">Yes ✓</button>
            </div>
          </div>` : ''}
        </div>`;
      }).join('')}
      <button class="btn-danger-ghost" id="btn-restart">↺ Restart Day</button>`;
  }

  /* ── Review ── */
  function htmlReview() {
    const pending = s.sessions.find(x => x.date !== s.today && x.status === 'active');
    const tasks = (pending?.picked_ids || []).map(id => getTaskForHistory(pending, id)).filter(Boolean);
    const allChecked = s.reviewChecked.length === tasks.length && tasks.length > 0;
    return `
      <div class="section-header">
        <div class="section-title">How'd it go?</div>

        <div>⚠️</div>

      </div>
      ${tasks.map(t => `
        <div class="review-task${s.reviewChecked.includes(t.id)?' checked':''}" data-review="${t.id}">
          <div class="review-checkbox">${s.reviewChecked.includes(t.id)?'✓':''}</div>
          <div class="review-task-info">
            <div class="review-task-title">${t.title}</div>
            <div class="review-task-sub">${t.description}</div>

      <div style="height:16px"></div>
      <button class="btn-primary" id="btn-submit-review">
        ${allChecked ? '🏆 Claim Points' : 'Submit — no points today'}
      </button>`;
  }

  /* ── Task Pool tab ── */
  function htmlTaskPool() {
    const active     = s.tasks.filter(t => !t.archived);
    const common     = active.filter(t => t.type === 'common');
    const legendary  = active.filter(t => t.type === 'legendary');
    const archived   = s.tasks.filter(t => t.archived);
    const isAdding   = s.editingTask?.id === '';

    function taskRow(t, i, arr) {
      const editing  = s.editingTask?.id === t.id;
      const deleting = s.deletingTask === t.id;
      return `
        <div class="pool-task-card card-${t.type}${t.type==='legendary'?' legendary-glow':''}"${t.type==='legendary'?' data-glow-id="'+t.id+'"':''}>
          <div class="pool-task-row">
            <div class="pool-task-info">
              <div class="pool-task-title">${t.title}</div>
              <div class="pool-task-desc">${t.description}</div>

            <div class="pool-task-actions">

              <button class="btn-icon" data-archive-task="${t.id}" title="Archive">📦</button>
              <button class="btn-icon del" data-delete-task="${t.id}" title="Delete">🗑</button>
            </div>
          </div>

          <div class="delete-confirm">
            <span class="delete-confirm-text">Delete forever?</span>
            <div style="display:flex;gap:6px">

              <button class="btn-del-yes" data-confirm-delete="${t.id}">Delete</button>
            </div>
          </div>` : ''}
          ${editing ? editForm(s.editingTask) : ''}
        </div>`;
    }

    function archivedRow(t) {
      const deleting = s.deletingTask === t.id;
      return `
        <div class="pool-task-card card-archived">
          <div class="pool-task-row">
            <div class="pool-task-info">
              <div class="pool-task-title">${t.title}</div>
              <div class="pool-task-desc">${t.description} · <em>${t.type}</em></div>
            </div>
            <div class="pool-task-actions">
              <button class="btn-icon restore" data-restore-task="${t.id}" title="Restore">↩️</button>
              <button class="btn-icon del" data-delete-task="${t.id}" title="Delete">🗑</button>
            </div>
          </div>
          ${deleting ? `
          <div class="delete-confirm">
            <span class="delete-confirm-text">Delete forever?</span>
            <div style="display:flex;gap:6px">
              <button class="btn-del-no" data-cancel-delete>Cancel</button>
              <button class="btn-del-yes" data-confirm-delete="${t.id}">Delete</button>
            </div>
          </div>` : ''}
        </div>`;
    }

    function editForm(task) {
      const saveClass = task.type ? `save-${task.type}` : '';
      return `
        <div class="task-edit-form">
          <input class="form-input" id="edit-title" placeholder="Task name" value="${task.title||''}">
          <input class="form-input" id="edit-desc"  placeholder="Description" value="${task.description||''}">
          <div class="form-row">
            <button class="form-type-btn${task.type==='common'?' active-common':''}" data-set-type="common">Common</button>
            <button class="form-type-btn${task.type==='legendary'?' active-legendary':''}" data-set-type="legendary">Legendary</button>
          </div>
          <div class="form-actions">
            <button class="btn-cancel" data-cancel-edit>Cancel</button>
            <button class="btn-save ${saveClass}" data-save-task>Save</button>
          </div>
        </div>`;
    }

    return `
      <div class="section-header" style="padding-bottom:8px">
        <div class="section-title">Task Pool</div>
        <div class="section-sub">${active.length} active · ${common.length} common · ${legendary.length} legendary${archived.length ? ` · ${archived.length} archived` : ''}</div>
      </div>
      ${isAdding ? `
        <div class="new-task-card">
          <div class="new-task-label">New Task</div>
          ${editForm(s.editingTask)}
        </div>` : `<button class="btn-add-task" id="btn-add-task">+ Add Task</button>`}
      <div class="pool-section-label label-common">Common</div>
      ${common.map(taskRow).join('')}
      <div class="pool-section-label label-legendary">Legendary</div>
      ${legendary.map(taskRow).join('')}
      ${archived.length ? `
        <div class="pool-section-label label-archived">Archived</div>
        ${archived.map(archivedRow).join('')}` : ''}`;
  }

  /* ── History ── */
  function htmlHistory() {
    const pts = computePoints();
    const sorted = s.sessions.slice().sort((a,b) => b.date.localeCompare(a.date));
    return `
      <div class="section-header" style="padding-bottom:20px">
        <div class="section-title">History</div>
      </div>
      <div class="points-bar">
        <div class="points-card">
          <div class="points-val common">${pts.common}</div>
          <div class="points-label">Common</div>
        </div>
        <div class="points-card legendary-glow" data-glow-id="pts-legendary">
          <div class="points-val legendary">${pts.legendary}</div>
          <div class="points-label">Legendary</div>
        </div>
        <div class="points-card mythic-glow" data-glow-id="pts-mythic">
          <div class="points-val mythic">${pts.mythic}</div>
          <div class="points-label">Mythic</div>
        </div>
      </div>

      ${!sorted.length ? `<div class="empty"><div class="empty-emoji">📜</div><div>No history yet.</div></div>` : ''}
      ${sorted.map(sess => {
        const tasks = (sess.picked_ids||[]).map(id => getTaskForHistory(sess, id)).filter(Boolean);
        const isDone = sess.status === 'done';
        const isWin  = isDone && (sess.completed_ids||[]).length === (sess.picked_ids||[]).length;
        const label  = sess.status === 'active' ? 'In Progress' : isWin ? 'Completed' : 'Failed';
        const cls    = sess.status === 'active' ? 'result-active' : isWin ? 'result-win' : 'result-fail';
        let cPts = 0, lPts = 0;
        const isMythic = isDone && (sess.picked_ids||[]).length === 5 && (sess.completed_ids||[]).length === 5;
        if (isDone) for (const id of (sess.completed_ids||[])) {
          const t = getTaskForHistory(sess, id);
          if (t?.type === 'legendary') lPts++; else cPts++;
        }
        return `
          <div class="history-card">
            <div class="history-card-top">
              <div class="history-date">${fmtDate(sess.date)}</div>
              <span class="history-result ${cls}">${label}</span>
            </div>
            <div class="history-tasks">
              ${tasks.map(t => {
                const done = (sess.completed_ids||[]).includes(t.id);
                return `<div class="history-task-row${done?' done':''}">
                  <span>${done?'✓':'○'}</span>
                  <span style="flex:1">${t.title}</span>
                  <span class="task-badge badge-${t.type}">${t.type}</span>
                </div>`;
              }).join('')}
            </div>
            ${isDone ? `<div class="history-pts">
              ${cPts ? `<span class="pts-earned pts-common">+${cPts} common</span>` : ''}
              ${lPts ? `<span class="pts-earned pts-legendary">+${lPts} legendary</span>` : ''}
              ${isMythic ? `<span class="pts-earned pts-mythic">+1 mythic ✨</span>` : ''}
              ${!cPts && !lPts ? `<span>No points earned</span>` : ''}
            </div>` : ''}
          </div>`;
      }).join('')}`;
  }

  /* ── Bind ── */
  function bind(screen) {
    document.querySelectorAll('.tab-btn').forEach(b =>
      b.addEventListener('click', () => { s.tab = b.dataset.tab; render(); }));

    if (screen === 'pick') {
      document.querySelectorAll('[data-pick]').forEach(el =>
        el.addEventListener('click', () => {
          const id = el.dataset.pick;
          if (s.picked.includes(id)) s.picked = s.picked.filter(x => x !== id);
          else if (s.picked.length < 5) s.picked.push(id);
          render();
        }));
      document.getElementById('btn-start')?.addEventListener('click', startDay);
      document.getElementById('btn-shuffle')?.addEventListener('click', () => {
        const active = s.tasks.filter(t => !t.archived);
        s.offered = shuffle(active).slice(0, Math.min(5, active.length)).map(t => t.id);
        s.picked = [];
        render();
      });
    }

    if (screen === 'active') {
      document.querySelectorAll('[data-confirm-task]').forEach(el =>
        el.addEventListener('click', () => {
          const taskId = el.dataset.confirmTask;
          s.confirmTask = s.confirmTask === taskId ? null : taskId;
          render();
        }));
      document.querySelector('[data-confirm-no]')?.addEventListener('click', e => {
        e.stopPropagation(); s.confirmTask = null; render();
      });
      const yesBtn = document.querySelector('[data-confirm-yes]');
      if (yesBtn) yesBtn.addEventListener('click', e => {
        e.stopPropagation(); completeTask(yesBtn.dataset.confirmYes);
      });
      document.getElementById('btn-restart')?.addEventListener('click', restartDay);
    }

    if (screen === 'review') {
      document.querySelectorAll('[data-review]').forEach(el =>
        el.addEventListener('click', () => {
          const id = el.dataset.review;
          if (s.reviewChecked.includes(id)) s.reviewChecked = s.reviewChecked.filter(x => x !== id);
          else s.reviewChecked.push(id);
          render();
        }));
      document.getElementById('btn-submit-review')?.addEventListener('click', submitReview);
    }

    if (screen === 'tasks') {
      document.querySelectorAll('[data-edit-task]').forEach(el =>
        el.addEventListener('click', () => {
          const t = getTask(el.dataset.editTask);
          s.editingTask = t ? { ...t } : null;
          s.deletingTask = null;
          render();
        }));
      document.querySelectorAll('[data-archive-task]').forEach(el =>
        el.addEventListener('click', () => archivePoolTask(el.dataset.archiveTask)));
      document.querySelectorAll('[data-restore-task]').forEach(el =>
        el.addEventListener('click', () => restorePoolTask(el.dataset.restoreTask)));
      document.querySelectorAll('[data-delete-task]').forEach(el =>
        el.addEventListener('click', () => {
          s.deletingTask = el.dataset.deleteTask;
          s.editingTask = null;
          render();
        }));
      document.querySelector('[data-cancel-delete]')?.addEventListener('click', () => {
        s.deletingTask = null; render();
      });
      const confirmDelBtn = document.querySelector('[data-confirm-delete]');
      if (confirmDelBtn) confirmDelBtn.addEventListener('click', () => {
        deletePoolTask(confirmDelBtn.dataset.confirmDelete);
      });
      document.querySelectorAll('[data-set-type]').forEach(el =>
        el.addEventListener('click', () => {
          if (s.editingTask) {
            s.editingTask.title = document.getElementById('edit-title')?.value ?? s.editingTask.title;
            s.editingTask.description = document.getElementById('edit-desc')?.value ?? s.editingTask.description;
            s.editingTask.type = el.dataset.setType;
            render();
          }
        }));
      document.querySelector('[data-cancel-edit]')?.addEventListener('click', () => {
        s.editingTask = null; render();
      });
      document.querySelector('[data-save-task]')?.addEventListener('click', () => {
        const title = document.getElementById('edit-title')?.value.trim();
        const description = document.getElementById('edit-desc')?.value.trim();
        if (!title || !s.editingTask?.type) return;
        savePoolTask({ ...s.editingTask, title, description });
      });
      document.getElementById('btn-add-task')?.addEventListener('click', () => {
        s.editingTask = { id: '', title: '', description: '', type: '' };
        render();
      });
    }
  }

  /* ── Today actions ── */
  async function startDay() {
    if (s.picked.length < 3) return;
    const pickedTasks = s.tasks.filter(t => s.picked.includes(t.id));
    const session = {
      id: Date.now().toString(),
      date: s.today,
      offered_ids: s.offered,
      picked_ids: s.picked.slice(),
      completed_ids: [],
      status: 'active',
      task_snapshots: pickedTasks,
    };
    s.sessions = s.sessions.filter(x => x.date !== s.today);
    s.sessions.push(session);
    s.picked = [];
    render();
    await sql`
      INSERT INTO daily_sessions (id, date, offered_ids, picked_ids, completed_ids, status, task_snapshots)
      VALUES (${session.id}, ${session.date}, ${session.offered_ids}, ${session.picked_ids}, ${session.completed_ids}, ${session.status}, ${JSON.stringify(session.task_snapshots)}::jsonb)
      ON CONFLICT (date) DO UPDATE SET
        id = EXCLUDED.id, offered_ids = EXCLUDED.offered_ids,
        picked_ids = EXCLUDED.picked_ids, completed_ids = EXCLUDED.completed_ids,
        status = EXCLUDED.status, task_snapshots = EXCLUDED.task_snapshots
    `;
  }

  async function completeTask(taskId) {
    const todaySess = s.sessions.find(x => x.date === s.today);
    if (!todaySess) return;
    const newCompleted = [...new Set([...(todaySess.completed_ids || []), taskId])];
    const allDone = newCompleted.length === todaySess.picked_ids.length;
    const newStatus = allDone ? 'done' : 'active';
    s.sessions = s.sessions.map(x => x.id === todaySess.id
      ? { ...x, completed_ids: newCompleted, status: newStatus } : x);
    s.confirmTask = null;
    render();
    await sql`
      UPDATE daily_sessions SET completed_ids = ${newCompleted}, status = ${newStatus}
      WHERE id = ${todaySess.id}
    `;
  }

  async function restartDay() {
    const todaySess = s.sessions.find(x => x.date === s.today);
    s.sessions = s.sessions.filter(x => x.date !== s.today);
    s.offered = [];
    s.picked = [];
    s.confirmTask = null;
    render();
    if (todaySess) await sql`DELETE FROM daily_sessions WHERE date = ${s.today}`;
  }

  async function submitReview() {
    const pending = s.sessions.find(x => x.date !== s.today && x.status === 'active');
    if (!pending) return;
    const allCompleted = s.reviewChecked.length === pending.picked_ids.length;
    const completedIds = allCompleted ? [...s.reviewChecked] : [];
    s.sessions = s.sessions.map(x => x.id === pending.id
      ? { ...x, completed_ids: completedIds, status: 'done' } : x);
    s.reviewChecked = [];
    render();
    await sql`
      UPDATE daily_sessions SET completed_ids = ${completedIds}, status = 'done'
      WHERE id = ${pending.id}
    `;
  }

  /* ── Task pool actions ── */
  async function savePoolTask(task) {
    const isNew = !task.id;
    if (isNew) task.id = Date.now().toString();
    if (isNew) s.tasks.push(task);
    else s.tasks = s.tasks.map(t => t.id === task.id ? task : t);
    s.editingTask = null;
    render();
    await sql`
      INSERT INTO tasks (id, title, description, type, archived)
      VALUES (${task.id}, ${task.title}, ${task.description}, ${task.type}, false)
      ON CONFLICT (id) DO UPDATE SET title = EXCLUDED.title, description = EXCLUDED.description, type = EXCLUDED.type
    `;
  }

  async function archivePoolTask(id) {
    s.tasks = s.tasks.map(t => t.id === id ? { ...t, archived: true } : t);
    render();
    await sql`UPDATE tasks SET archived = true WHERE id = ${id}`;
  }

  async function restorePoolTask(id) {
    s.tasks = s.tasks.map(t => t.id === id ? { ...t, archived: false } : t);
    render();
    await sql`UPDATE tasks SET archived = false WHERE id = ${id}`;
  }

  async function deletePoolTask(id) {
    s.tasks = s.tasks.filter(t => t.id !== id);
    s.deletingTask = null;
    render();
    await sql`DELETE FROM tasks WHERE id = ${id}`;
  }

  /* ── Load ── */
  async function load() {
    try {
      await sql`
        CREATE TABLE IF NOT EXISTS daily_sessions (
          id text primary key,
          date text not null unique,
          offered_ids text[] not null default '{}',
          picked_ids text[] not null default '{}',
          completed_ids text[] not null default '{}',
          status text not null default 'picking',
          created_at timestamptz default now()
        )
      `;
      await sql`
        CREATE TABLE IF NOT EXISTS tasks (
          id text primary key,
          title text not null,
          description text,
          type text not null,
          created_at timestamptz default now()
        )
      `;
      // Add columns introduced after initial schema (idempotent)
      await sql`ALTER TABLE tasks ADD COLUMN IF NOT EXISTS archived boolean NOT NULL DEFAULT false`;
      await sql`ALTER TABLE daily_sessions ADD COLUMN IF NOT EXISTS task_snapshots jsonb DEFAULT '[]'`;

      const [sessionRows, taskRows] = await Promise.all([
        sql`SELECT * FROM daily_sessions`,
        sql`SELECT * FROM tasks`,
      ]);
      s.sessions = sessionRows;

      if (taskRows.length === 0) {
        await sql`
          INSERT INTO tasks (id, title, description, type) VALUES
          ('c1',  'Morning Walk',      'Take a 20-minute walk outside',              'common'),
          ('c2',  'Hydrate',           'Drink 8 glasses of water',                   'common'),
          ('c3',  'Read',              'Read for at least 20 minutes',               'common'),
          ('c4',  'Meditate',          '10 minutes of mindfulness',                  'common'),
          ('c5',  'Journal',           'Write 5 minutes in your journal',            'common'),
          ('c6',  'No Social Media',   'Avoid social media until noon',              'common'),
          ('c7',  'Exercise',          'Work out for 30 minutes',                    'common'),
          ('c8',  'Healthy Breakfast', 'Eat a nutritious breakfast',                 'common'),
          ('c9',  'Connect',           'Reach out to someone you care about',        'common'),
          ('c10', 'Early Bed',         'In bed before midnight',                     'common'),
          ('l1',  'The Fast',          'Complete a 16-hour fast',                    'legendary'),
          ('l2',  'Ice Bath',          'Take a cold shower or ice bath',             'legendary'),
          ('l3',  'Deep Work',         '3 hours of uninterrupted focused work',      'legendary')
          ON CONFLICT (id) DO NOTHING
        `;
        s.tasks = DEFAULT_TASKS.map(t => ({ ...t, archived: false }));
      } else {
        s.tasks = taskRows;
      }

      s.loading = false;
      const todaySess = s.sessions.find(x => x.date === s.today);
      if (todaySess?.offered_ids?.length) s.offered = todaySess.offered_ids;
      render();
    } catch (err) {
      document.getElementById('app').innerHTML =
        `<div class="loading" style="color:#ef4444">Failed to connect to database.<br><small>${err.message}</small></div>`;
    }
  }

  render();
  load();

  if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
</script>
</body>
</html>
