<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#f0f4ff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Ritual">
  <link rel="apple-touch-icon" href="/icon.png">
  <link rel="icon" type="image/png" href="/favicon.png">
  <title>Ritual</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg: #f0f4ff;
      --card: #ffffff;
      --accent: #363c69;
      --accent2: #6b72a8;
      --legendary: #c4712d;
      --legendary-bg: #fce8d4;
      --legendary-dark: #6d3a11;
      --mythic: #b87ad7;
      --mythic-dark: #5c2e7a;
      --mythic-bg: #f3e8fb;
      --common: #999da6;
      --common-dark: #6d727f;
      --common-light: #f3f4f6;
      --common-completed: var(--common);
      --legendary-completed: var(--legendary);
      --mythic-completed: var(--mythic);
      --text: #1e1b4b;
      --subtext: #6b7280;
      --border: #e0e7ff;
      --success: #22c55e;
      --danger: #ef4444;
      --warning-bg: #fef3c7;
      --radius: 20px;
      --shadow: 0 2px 12px rgba(79,70,229,0.08);
    }
    body { background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; min-height: 100vh; max-width: 480px; margin: 0 auto; transition: background 0.45s ease; }
    body.mythic-bg { background: var(--mythic); }
    body.mythic-bg .tab-bar { background: var(--mythic); border-top-color: rgba(255,255,255,0.2); transition: background 0.45s ease; }
    body.mythic-bg .tab-btn { color: rgba(255,255,255,0.6); }
    body.mythic-bg .tab-btn.active { color: #fff; }
    body.mythic-bg .section-sub,
    body.mythic-bg .pick-count,
    body.mythic-bg .btn-ghost { color: rgba(255,255,255,0.75); }
    body.mythic-bg .pick-count strong { color: #fff; }
    body.mythic-bg .task-card .task-title { color: var(--text); }
    body.mythic-bg .task-card .task-desc  { color: var(--subtext); }
    body.mythic-bg .btn-reroll { color: rgba(255,255,255,0.85); }

    .tab-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: #fff; border-top: 1px solid var(--border); display: flex; align-items: flex-end; z-index: 100; padding: 0 12px calc(16px + env(safe-area-inset-bottom)) 12px; box-shadow: 0 -2px 12px rgba(0,0,0,0.05); overflow: visible; }
    .tab-btn { flex: 1; padding: 12px 8px; background: none; border: none; color: var(--subtext); font-size: 0.72rem; font-weight: 600; font-family: inherit; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; transition: color 0.15s; position: relative; }
    .tab-icon { font-size: 1.4rem; line-height: 1; }
    .tab-btn.active { color: var(--accent); }
    .tab-btn.active span:last-child { text-decoration: underline; text-underline-offset: 3px; }
    @keyframes tab-mythic-breathe {
      0%, 100% { opacity: 0.4; }
      50%       { opacity: 0.8; }
    }
    .tab-btn.mythic-active { isolation: isolate; }
    .tab-btn.mythic-active::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(184,122,215,0.6) 0%, transparent 70%);
      z-index: -1;
      pointer-events: none;
      animation: tab-mythic-breathe 3s ease-in-out infinite;
    }

    .content { padding: 0 20px calc(120px + env(safe-area-inset-bottom)) 20px; }

    /* Buttons */
    .btn-primary { width: 100%; padding: 17px; background: var(--accent); color: #fff; font-weight: 700; font-size: 1.05rem; letter-spacing: 0.04em; line-height: 1; border: none; border-radius: var(--radius); cursor: pointer; font-family: inherit; box-shadow: 0 4px 16px rgba(0,0,0,0.12); transition: transform 0.1s; touch-action: manipulation; }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.4; pointer-events: none; }
    .btn-ghost { width: 100%; padding: 14px; background: none; color: var(--subtext); font-size: 0.9rem; font-weight: 600; border: none; cursor: pointer; font-family: inherit; margin-top: 4px; }
    .btn-danger-ghost { width: 100%; padding: 14px; background: none; color: var(--danger); font-size: 0.88rem; font-weight: 600; border: none; cursor: pointer; font-family: inherit; margin-top: 4px; }

    /* Points bar */
    .points-bar { display: flex; gap: 10px; margin-bottom: 28px; }
    .points-card { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 14px; text-align: center; box-shadow: var(--shadow); position: relative; }
    .points-val { font-size: 2rem; font-weight: 700; line-height: 1; }
    .points-val.common { color: var(--common); }
    .points-val.legendary { color: var(--legendary); }
    .points-val.mythic { color: var(--mythic); }
    .points-label { font-size: 0.68rem; color: var(--subtext); font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; margin-top: 4px; }

    /* Task option cards (pick screen) */
    .task-card { background: var(--card); border: 2px solid #d1d5db; border-radius: var(--radius); padding: 16px 18px; margin-bottom: 10px; cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s, transform 0.1s; box-shadow: var(--shadow); position: relative; }
    .task-card:active { transform: scale(0.98); }
    .task-card.selected { border-color: var(--common); background: var(--common-light); box-shadow: var(--shadow); }
    /* ── Legendary glow via ::before so it always sits behind card backgrounds ── */
    @keyframes legendary-breathe {
      0%, 100% { box-shadow: 0 0 14px 3px color-mix(in srgb, var(--legendary) 40%, transparent); }
      50%       { box-shadow: 0 0 14px 3px color-mix(in srgb, var(--legendary) 80%, transparent); }
    }
    .legendary-glow::before,
    .task-card.legendary-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      z-index: -1;
      animation: legendary-breathe var(--glow-duration, 2400ms) ease-in-out infinite;
      animation-delay: var(--glow-delay, 0ms);
    }
    .legendary-glow { }
    .task-card.legendary-card { border: 2px solid color-mix(in srgb, var(--legendary) 35%, transparent); }
    .task-card.legendary-card.selected { border-color: color-mix(in srgb, var(--legendary) 80%, transparent); background: var(--legendary-bg); box-shadow: var(--shadow); }
    .task-card.legendary-card.selected::before { animation: none; box-shadow: 0 0 14px 3px color-mix(in srgb, var(--legendary) 80%, transparent); }
    .task-card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }
    .task-title { font-size: 1.05rem; font-weight: 700; }
    .rarity-tag { display: inline-flex; align-items: center; padding: 4px 6px 4px; border-radius: 6px; font-size: 0.62rem; font-weight: 700; letter-spacing: 0.07em; line-height: 1; text-transform: uppercase; flex-shrink: 0; }
    .rarity-tag-common    { background: var(--common);    color: var(--common-light); }
    .rarity-tag-legendary { background: var(--legendary); color: var(--legendary-bg); }
    .rarity-tag-mythical  { background: var(--mythic);    color: var(--mythic-bg); }
    .task-desc { font-size: 0.84rem; color: var(--subtext); }

    /* Active task list */
    .active-task { background: var(--card); border: 2px solid var(--border); border-radius: var(--radius); padding: 16px 18px; margin-bottom: 10px; cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s; box-shadow: var(--shadow); position: relative; }
    /* idle = default; selected = tapped/highlighted */
    .active-task.type-legendary { border: 2px solid color-mix(in srgb, var(--legendary) 35%, transparent); }
    .active-task.selected { border-color: var(--common); box-shadow: var(--shadow); }
    .active-task.selected.type-legendary { border: 2px solid color-mix(in srgb, var(--legendary) 80%, transparent); box-shadow: var(--shadow); }
    .active-task.selected.type-legendary::before { animation: none; box-shadow: 0 0 14px 3px color-mix(in srgb, var(--legendary) 80%, transparent); }
    .active-task.completed { cursor: pointer; transition: none; z-index: 60; }
    .active-task.completed.type-common    { background: var(--common-completed);    border-color: var(--common-completed);    color: #fff; }
    .active-task.completed.type-legendary { background: var(--legendary-completed); border-color: var(--legendary-completed); color: #fff; }
    .active-task.completed.type-mythic    { background: var(--mythic-completed);    border-color: var(--mythic-completed);    color: #fff; }
    .active-task.completed.type-common    .rarity-tag { background: var(--common-dark);    color: var(--common-light); }
    .active-task.completed.type-legendary .rarity-tag { background: var(--legendary-dark); color: var(--legendary-bg); }
    .active-task.completed.type-mythic    .rarity-tag { background: var(--mythic-dark);    color: var(--mythic-bg); }
    .active-task.completed .active-task-desc { color: rgba(255,255,255,0.7); }
    .active-task.completed .task-confirm-text { color: #fff; }
    .active-task.completed .task-confirm { border-top-color: rgba(255,255,255,0.3); }
.active-task-row { display: flex; align-items: center; gap: 14px; }
    .active-task-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .dot-common { background: var(--common); }
    .dot-legendary { background: var(--legendary); }
    .active-task-check { width: 24px; height: 24px; border-radius: 50%; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; flex-shrink: 0; }
    .type-legendary .active-task-check { background: var(--legendary-dark); }
    .type-common    .active-task-check { background: var(--common-dark); }
    .active-task-info { flex: 1; }
    .active-task-title { font-size: 1rem; font-weight: 700; }
    .active-task-desc { font-size: 0.82rem; color: var(--subtext); margin-top: 2px; }
    .task-confirm { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .task-confirm-text { font-size: 0.88rem; font-weight: 600; color: var(--text); }
    .btn-confirm-yes { background: var(--success); color: #fff; border: none; border-radius: 10px; padding: 8px 18px; font-size: 0.88rem; font-weight: 700; cursor: pointer; font-family: inherit; }
    .btn-confirm-yes.btn-danger { background: var(--danger); }
    .btn-confirm-no  { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 8px 18px; font-size: 0.88rem; font-weight: 600; cursor: pointer; font-family: inherit; color: var(--text); }
    .btn-confirm-no.btn-red    { background: var(--danger); border-color: var(--danger); color: #fff; }

    /* Review */
    .review-task { background: var(--card); border: 2px solid var(--border); border-radius: var(--radius); padding: 16px 18px; margin-bottom: 10px; transition: border-color 0.15s, box-shadow 0.15s; box-shadow: var(--shadow); }
    .review-task.checked { border-color: var(--success); box-shadow: 0 0 0 1px var(--success), var(--shadow); }
    .review-task.declined { border-color: var(--danger); box-shadow: 0 0 0 1px var(--danger), var(--shadow); }
    .review-task-main { display: flex; align-items: center; gap: 14px; }
    .review-checkbox { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 0.9rem; transition: all 0.15s; }
    .review-task.checked .review-checkbox { background: var(--success); border-color: var(--success); color: #fff; }
    .review-task.declined .review-checkbox { background: var(--danger); border-color: var(--danger); color: #fff; }
    .review-task-info { flex: 1; }
    .review-task-title { font-size: 1rem; font-weight: 700; }
    .review-task-sub { font-size: 0.82rem; color: var(--subtext); margin-top: 2px; }
    .review-task-confirm { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }

    /* Warning */
    .warning-banner { background: var(--warning-bg); border: 1px solid #fde68a; border-radius: 14px; padding: 14px 16px; margin-bottom: 20px; display: flex; gap: 10px; align-items: flex-start; }
    .warning-text { font-size: 0.84rem; color: #92400e; font-weight: 600; line-height: 1.4; }

    /* Section headers */
    .section-header { padding: 48px 0 24px; }
    .section-title { font-size: 1.6rem; font-weight: 700; }
    .section-sub { font-size: 0.88rem; color: var(--subtext); margin-top: 4px; }

    /* Pick count */
    .pick-count { text-align: center; font-size: 0.88rem; color: var(--subtext); font-weight: 600; margin-bottom: 14px; }
    .pick-count strong { color: var(--accent); }
    .pick-count.mythic-pick strong { color: var(--mythic); text-shadow: 0 0 12px color-mix(in srgb, var(--mythic) 80%, transparent), 0 0 28px color-mix(in srgb, var(--mythic) 40%, transparent); }

    /* Home / active header */
    .home-header { padding: 52px 0 24px; text-align: center; }
    .home-emoji { font-size: 5.5rem; line-height: 1; margin-bottom: 12px; }
    .home-title { font-size: 1.8rem; font-weight: 700; }
    .home-sub { font-size: 0.9rem; color: var(--subtext); margin-top: 6px; }
    .reset-confirm-box { margin-top: 20px; background: #fee2e2; border: 1px solid #fca5a5; border-radius: var(--radius); padding: 16px 18px; }
    .reset-confirm-label { font-size: 0.88rem; font-weight: 700; color: #dc2626; margin-bottom: 10px; }
    .reset-confirm-sub { font-size: 0.8rem; color: #991b1b; margin-bottom: 12px; line-height: 1.4; }
    .btn-reset-danger { width: 100%; padding: 14px; background: var(--danger); color: #fff; font-weight: 700; font-size: 0.95rem; border: none; border-radius: var(--radius); cursor: pointer; font-family: inherit; margin-top: 16px; }
    .btn-reset-cancel { width: 100%; padding: 12px; background: none; color: var(--subtext); font-size: 0.88rem; font-weight: 600; border: none; cursor: pointer; font-family: inherit; margin-top: 4px; }
    .tasks-label { font-size: 0.68rem; color: var(--subtext); font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; }

    /* Task pool tab */
    .pool-section-label { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; margin: 20px 0 8px; }
    .pool-section-label.label-common { color: var(--subtext); }
    .pool-section-label.label-legendary { color: var(--legendary); }
    .pool-section-label.label-archived { color: var(--subtext); }
    .pool-section-label.label-mythic   { color: var(--mythic); }
    .pool-task-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 8px; box-shadow: var(--shadow); position: relative; }
    .pool-task-card.card-common { border-color: color-mix(in srgb, var(--common) 35%, transparent); }
    .pool-task-card.card-legendary { border-color: color-mix(in srgb, var(--legendary) 35%, transparent); }
    .pool-task-card.card-archived { opacity: 0.55; }
    .pool-task-card.pool-pickable { cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s; }
    .pool-task-card.pool-pickable:active { transform: scale(0.98); }
    .pool-task-row { display: flex; align-items: center; gap: 10px; }
    .pool-task-info { flex: 1; min-width: 0; }
    .pool-task-title { font-size: 0.95rem; font-weight: 700; }
    .pool-task-desc { font-size: 0.8rem; color: var(--subtext); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pool-task-actions { display: flex; gap: 4px; flex-shrink: 0; }
    .pool-task-stats { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; flex-shrink: 0; }
    .pool-stat { font-size: 0.7rem; font-weight: 600; color: var(--subtext); white-space: nowrap; }
    .pool-stat span { color: var(--text); }
    .btn-icon { background: none; border: none; cursor: pointer; font-size: 1rem; padding: 6px; border-radius: 8px; color: var(--subtext); transition: background 0.15s, color 0.15s; }
    .btn-icon:hover { background: var(--bg); }
    .btn-icon.del:hover { color: var(--danger); }
    .btn-icon.restore:hover { color: var(--common); }

    /* Delete confirmation inline */
    .delete-confirm { margin-top: 10px; padding: 10px 12px; background: #fee2e2; border-radius: 12px; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .delete-confirm-text { font-size: 0.84rem; font-weight: 700; color: #dc2626; }
    .btn-del-yes { background: var(--danger); color: #fff; border: none; border-radius: 10px; padding: 7px 16px; font-size: 0.84rem; font-weight: 700; cursor: pointer; font-family: inherit; }
    .btn-del-no  { background: none; border: 1px solid #fca5a5; border-radius: 10px; padding: 7px 14px; font-size: 0.84rem; font-weight: 600; cursor: pointer; font-family: inherit; color: #dc2626; }

    /* Task edit form */
    .task-edit-form { border-top: 1px solid var(--border); margin-top: 12px; padding-top: 12px; display: flex; flex-direction: column; gap: 8px; }
    .form-input { width: 100%; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 12px; font-family: inherit; font-size: 0.9rem; color: var(--text); background: var(--bg); outline: none; }
    .form-input:focus { border-color: var(--common); }
    .form-row { display: flex; gap: 8px; align-items: center; }
    .form-type-btn { flex: 1; padding: 8px; border: 1.5px solid var(--border); border-radius: 12px; font-family: inherit; font-size: 0.8rem; font-weight: 700; cursor: pointer; background: none; color: var(--subtext); }
    .form-type-btn.active-common { border-color: var(--common); background: var(--common-light); color: var(--subtext); }
    .form-type-btn.active-legendary { border-color: var(--legendary); background: var(--legendary-bg); color: var(--legendary); }
    .form-actions { display: flex; gap: 8px; margin-top: 4px; }
    .btn-save { flex: 1; padding: 10px; color: #fff; border: none; border-radius: 12px; font-family: inherit; font-size: 0.9rem; font-weight: 700; cursor: pointer; background: var(--border); opacity: 0.5; pointer-events: none; }
    .btn-save.save-common { background: var(--common); opacity: 1; pointer-events: auto; }
    .btn-save.save-legendary { background: var(--legendary); opacity: 1; pointer-events: auto; }
    .btn-save.save-mythic { background: var(--mythic); opacity: 1; pointer-events: auto; }
    .btn-cancel { padding: 10px 16px; background: none; border: 1px solid var(--border); border-radius: 12px; font-family: inherit; font-size: 0.9rem; cursor: pointer; color: var(--subtext); }
    .btn-add-task { width: 100%; padding: 14px; border: 2px dashed var(--border); border-radius: var(--radius); background: none; font-family: inherit; font-size: 0.9rem; font-weight: 600; color: var(--subtext); cursor: pointer; margin-bottom: 4px; transition: border-color 0.15s, color 0.15s; }
    .btn-add-task:hover { border-color: var(--common); color: var(--common); }

    /* Back button */
    .btn-back { background: none; border: none; font-family: inherit; font-size: 0.82rem; font-weight: 600; color: var(--accent); cursor: pointer; padding: 0 0 6px 0; display: block; }
    .btn-profile-icon { background: none; border: none; font-size: 1.3rem; cursor: pointer; padding: 4px; line-height: 1; }

    /* Profile settings */
    .settings-section { margin-top: 20px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; box-shadow: var(--shadow); }
    .settings-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .settings-label { font-size: 0.95rem; font-weight: 600; color: var(--text); }
    .settings-select { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 7px 10px; font-family: inherit; font-size: 0.88rem; font-weight: 600; color: var(--text); cursor: pointer; }
    .settings-sub { font-size: 0.78rem; color: var(--subtext); margin-top: 6px; }
    .toggle-switch { position: relative; display: inline-block; width: 44px; height: 24px; flex-shrink: 0; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; position: absolute; }
    .toggle-slider { position: absolute; inset: 0; background: var(--border); border-radius: 24px; transition: background 0.2s; cursor: pointer; }
    .toggle-slider::before { content: ''; position: absolute; height: 18px; width: 18px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: transform 0.2s; box-shadow: 0 1px 4px rgba(0,0,0,0.2); }
    .toggle-switch input:checked + .toggle-slider { background: var(--accent); }
    .toggle-switch input:checked + .toggle-slider::before { transform: translateX(20px); }
    .testing-tools { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; box-shadow: var(--shadow); margin-top: 8px; }
    .testing-group-label { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--subtext); margin-bottom: 8px; margin-top: 16px; }
    .testing-group-label:first-child { margin-top: 0; }
    .testing-group-label.danger { color: var(--danger); }

    /* Store manage */
    .store-manage-row { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; gap: 10px; box-shadow: var(--shadow); }
    .store-manage-info { flex: 1; min-width: 0; }
    .store-manage-name { font-size: 0.95rem; font-weight: 700; }
    .store-manage-meta { font-size: 0.78rem; color: var(--subtext); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .store-manage-actions { display: flex; gap: 6px; flex-shrink: 0; }

    /* Profile menu */
    .profile-menu { display: flex; flex-direction: column; gap: 2px; }

    /* FTUE — shared layout */
    body.no-scroll { position: fixed; width: 100%; }
    .ftue-splash, .ftue-slides { min-height: 100vh; display: flex; flex-direction: column; }
    .ftue-splash { position: relative; overflow: hidden; background: linear-gradient(135deg, var(--common) 0%, var(--legendary) 50%, var(--mythic) 100%); }
    .ftue-main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 60px 20px 0; }

    .splash-blob-3 { width: 90vw;  height: 90vw;  background: var(--mythic);    top: 25%; left: 15%; animation: splash-drift-3 11s ease-in-out infinite; }
    @keyframes splash-drift-1 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(25vw,20vh) scale(1.1); } }
    @keyframes splash-drift-2 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(-20vw,-18vh) scale(0.9); } }
    @keyframes splash-drift-3 { 0%,100% { transform: translate(0,0) scale(1.05); } 33% { transform: translate(-18vw,12vh) scale(0.95); } 66% { transform: translate(12vw,-15vh) scale(1.1); } }
    .ftue-footer { padding: 0 0 calc(48px + env(safe-area-inset-bottom)); display: flex; flex-direction: column; align-items: stretch; gap: 16px; }

    .tutorial-gradient { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; height: 66.67vh; pointer-events: none; background: linear-gradient(to top, rgba(0,0,0,0.40) 0%, rgba(0,0,0,0.40) 50%, transparent 100%); }

<script
  data-clerk-publishable-key="pk_test_d29ya2FibGUtcGVsaWNhbi0xOC5jbGVyay5hY2NvdW50cy5kZXYk"
  src="https://workable-pelican-18.clerk.accounts.dev/npm/@clerk/clerk-js@5/dist/clerk.browser.js"
  crossorigin="anonymous"
></script>
<script type="module">
  let clerk;

  async function api(method, path, data) {
    const token = await clerk?.session?.getToken();
    const headers = { Authorization: `Bearer ${token}` };
    let url = path, opts = { method, headers };
    if (data !== undefined && (method === 'GET' || method === 'DELETE')) {
      const qs = new URLSearchParams(data).toString();
      if (qs) url += '?' + qs;
    } else if (data !== undefined) {
      headers['Content-Type'] = 'application/json';
      opts.body = JSON.stringify(data);
    }
    const res = await fetch(url, opts);
    if (!res.ok) throw new Error(await res.text());
    return res.json();
  }

  const DEFAULT_TASK_IDS = new Set(['c1','c2','c3','c6','c8','c9','c10','l1','l2','l4']);

  /* ── Default offerings (fallback when DB is empty) ── */
  const STORE_ITEMS = [
    { id: 'o1', name: 'Guilt Free Treat', cost: 5,  rarity: 'mythic', desc: 'Indulge with a treat you wouldn\'t normally eat' },
    { id: 'o2', name: 'Purge',            cost: 15, rarity: 'mythic', desc: 'Have a day for yourself, no consequences'         },
  ];

  function displayRarity(r) {
    if (r === 'mythic') return 'Mythical';
    return r.charAt(0).toUpperCase() + r.slice(1);
  }
  function rarityTag(rarity) {
    const cls = rarity === 'mythic' ? 'mythical' : rarity;
    return `<span class="rarity-tag rarity-tag-${cls}">${displayRarity(rarity).toUpperCase()}</span>`;
  }

  /* ── Default task pool (seed data) ── */
  const DEFAULT_TASKS = [
    { id:'c1',  type:'common',    title:'Morning Walk',      description:'Take a 20-minute walk outside' },
    { id:'c2',  type:'common',    title:'Hydrate',           description:'Drink 8 glasses of water' },
    { id:'c3',  type:'common',    title:'Read',              description:'Read for at least 20 minutes' },
    { id:'c4',  type:'common',    title:'Meditate',          description:'10 minutes of mindfulness' },
    { id:'c5',  type:'common',    title:'Journal',           description:'Write 5 minutes in your journal' },
    { id:'c6',  type:'common',    title:'No Social Media',   description:'Avoid social media until noon' },
    { id:'c7',  type:'common',    title:'Exercise',          description:'Work out for 30 minutes' },
    { id:'c8',  type:'common',    title:'Healthy Breakfast', description:'Eat a nutritious breakfast' },
    { id:'c9',  type:'common',    title:'Connect',           description:'Reach out to someone you care about' },
    { id:'c10', type:'common',    title:'Early Bed',         description:'In bed before midnight' },
    { id:'l1',  type:'legendary', title:'The Fast',          description:'Complete a 16-hour fast' },
    { id:'l2',  type:'legendary', title:'Ice Bath',          description:'Take a cold shower or ice bath' },
    { id:'l3',  type:'legendary', title:'Deep Work',         description:'3 hours of uninterrupted focused work' },
  ];

  function getTask(id) { return s.tasks.find(t => t.id === id); }
  function getTaskForHistory(sess, id) {
    if (sess.task_snapshots?.length) {
      const snap = sess.task_snapshots.find(t => t.id === id);
      if (snap) return snap;
    }
    return getTask(id);
  }

  /* ── Day reset helpers (must be before state init) ── */
  let RESET_HOUR = 8;
  const GRACE_HOURS = 3;

  function localDateStr(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
  function todayStr() {
    const now = new Date();
    // Before reset hour, it's still "yesterday"
    if (now.getHours() < RESET_HOUR) {
      return localDateStr(new Date(now.getFullYear(), now.getMonth(), now.getDate() - 1));
    }
    return localDateStr(now);
  }
  function isInGracePeriod() {
    const h = new Date().getHours();
    return h >= RESET_HOUR && h < RESET_HOUR + GRACE_HOURS;
  }

  /* ── State ── */
  function initialState() {
    return {
      tab: 'today',
      loading: true,
      sessions: [],
      tasks: [],
      today: todayStr(),
      activePlanId: null,
      offered: [],
      picked: [],
      planBuildState: 'generate',
      confirmTask: null,
      editingTask: null,
      deletingTask: null,
      confirmEditTask: null,
      newTaskType: 'common',
      profileScreen: 'menu',
      poolEditMode: false,
      showResetConfirm: false,
      storeItems: [],
      editingStoreItem: null,
      storeEditMode: false,
      wallet: { common: 0, legendary: 0, mythic: 0 },
      lastPurchaseDate: null,
      lastPurchasedItem: null,
      selectedStoreItem: null,
      showPurchasedScreen: false,
      storeScreen: 'store',
      lastCraftResult: null,
      reviewDeclined: [],
      suppressSubmitCta: false,
      graceConfirmTask: null,
      overlayScreen: null,
      pendingReward: null,
      hasCompletedOnboarding: false,
      onboardingRitualCount: 0,
      ftueScreen: null,
      ftueSlide: 0,
      hasShownRecordTutorial: false,
      hasShownBazaarTutorial: false,
      tutorialFlow: null,
      tutorialStep: 0,
    };
  }
  let s = initialState();

  /* ── Screen logic ── */
  function getScreen() {
    if (s.loading) return 'loading';
    if (s.ftueScreen) return s.ftueScreen;
    if (s.overlayScreen) return s.overlayScreen;
    if (isInGracePeriod()) {
      const pending = s.sessions.find(x => x.date !== s.today && x.status === 'active');
      if (pending) return 'concluded';
    }
    if (s.activePlanId && s.sessions.find(x => x.id === s.activePlanId)) return 'active';
    return 'pick';
  }

  function activePlan() {
    return s.activePlanId ? s.sessions.find(x => x.id === s.activePlanId) : null;
  }

  /* ── Points ── */
  function computePoints() {
    let common = 0, legendary = 0, mythic = 0;
    for (const sess of s.sessions) {
      if (sess.status !== 'done') continue;
      const picked = (sess.picked_ids || []).length;
      const completed = (sess.completed_ids || []).length;
      if (picked === 0 || completed < picked) continue; // only fully-completed plans earn points
      if (picked === 5) mythic++;
      for (const id of sess.completed_ids) {
        const t = getTaskForHistory(sess, id);
        if (t?.type === 'legendary') legendary++; else common++;
      }
    }
    return { common, legendary, mythic };
  }

  /* ── Helpers ── */
  function burstParticles(cardEl, emojis, count) {
    const rect = cardEl.getBoundingClientRect();
    for (let i = 0; i < count; i++) {
      const emoji = emojis[Math.floor(Math.random() * emojis.length)];
      const angle = Math.random() * 2 * Math.PI;
      const dist  = 80 + Math.random() * 70;
      const size  = 18 + Math.random() * 10;
      const tx    = Math.cos(angle) * dist;
      const ty    = Math.sin(angle) * dist;
      const ox    = rect.left + Math.random() * rect.width;
      const oy    = rect.top  + Math.random() * rect.height;
      const el    = document.createElement('div');
      el.textContent = emoji;
      el.style.cssText = `position:fixed;left:${ox}px;top:${oy}px;font-size:${size}px;line-height:1;z-index:65;pointer-events:none;user-select:none;transform:translate(-50%,-50%);`;
      document.body.appendChild(el);
      el.animate([
        { transform:`translate(-50%,-50%) translate(0,0)` },
        { transform:`translate(-50%,-50%) translate(${tx}px,${ty}px)` },
      ], { duration:1500, easing:'cubic-bezier(0.15,0.85,0.35,1.0)', fill:'forwards' });
      el.animate([
        { opacity:1, offset:0 },
        { opacity:1, offset:0.667 },
        { opacity:0, offset:1 },
      ], { duration:1500, easing:'linear', fill:'forwards' })
        .onfinish = () => el.remove();
    }
  }

  function startRewardFloaters(emojis) {
    const container = document.getElementById('reward-floaters');
    if (!container) return;

    function spawnFloater(startBelow = 0, duration = null) {
      if (!container.isConnected) return;
      const emoji = emojis[Math.floor(Math.random() * emojis.length)];
      const x     = 5 + Math.random() * 90;
      const size  = 22 + Math.random() * 28;
      const dur   = duration ?? (2500 + Math.random() * 1500);
      const el    = document.createElement('div');
      el.textContent = emoji;
      const topVal = startBelow > 0 ? `calc(100% + ${Math.round(startBelow)}px)` : '100%';
      el.style.cssText = `position:absolute;left:${x}%;top:${topVal};font-size:${size}px;line-height:1;pointer-events:none;user-select:none;`;
      container.appendChild(el);
      el.animate([
        { transform:'translateY(0)' },
        { transform:`translateY(calc(-100vh - ${120 + Math.round(startBelow)}px))` },
      ], { duration:dur, easing:'ease-in', fill:'forwards' })
        .onfinish = () => el.remove();
    }

    // Phase 1 — burst: 40 emojis, staggered across 1.5 s, gentler ease-in
    for (let i = 0; i < 40; i++) {
      const startBelow = Math.random() * 200;
      const dur        = 1000 + Math.random() * 800;
      const delay      = Math.random() * 1500;
      if (!container.isConnected) return;
      const emoji = emojis[Math.floor(Math.random() * emojis.length)];
      const x     = 5 + Math.random() * 90;
      const size  = 22 + Math.random() * 28;
      const el    = document.createElement('div');
      el.textContent = emoji;
      const topVal = startBelow > 0 ? `calc(100% + ${Math.round(startBelow)}px)` : '100%';
      el.style.cssText = `position:absolute;left:${x}%;top:${topVal};font-size:${size}px;line-height:1;pointer-events:none;user-select:none;`;
      container.appendChild(el);
      el.animate([
        { transform:'translateY(0)' },
        { transform:`translateY(calc(-100vh - ${120 + Math.round(startBelow)}px))` },
      ], { duration:dur, delay, easing:'cubic-bezier(0.6,0,1,1)', fill:'forwards' })
        .onfinish = () => el.remove();
    }

    // Phase 2 — trickle: one every ~1 second, slower ambient pace
    function trickle() {
      if (!container.isConnected) return;
      spawnFloater(0);
      setTimeout(trickle, 700 + Math.random() * 600);
    }
    setTimeout(trickle, 800);
  }

  function legendaryGlowBurst(cardEl) {
    const rect = cardEl.getBoundingClientRect();
    const el = document.createElement('div');
    el.style.cssText = `position:fixed;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;height:${rect.height}px;border-radius:20px;z-index:64;pointer-events:none;`;
    document.body.appendChild(el);
    el.animate([
      { boxShadow:'0 0 0 4px rgba(196,113,45,1), 0 0 50px 24px rgba(196,113,45,0.9)', opacity:1, transform:'scale(1)' },
      { boxShadow:'0 0 0 0px rgba(196,113,45,0),  0 0 0px  0px rgba(196,113,45,0)',   opacity:0, transform:'scale(1.25)' },
    ], { duration:700, easing:'ease-out', fill:'forwards' })
      .onfinish = () => el.remove();
  }

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length-1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i+1));
      [a[i],a[j]] = [a[j],a[i]];
    }
    return a;
  }

  function fmtDate(str) {
    if (!str) return '';
    return new Date(str + 'T12:00:00').toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
  }

  function ensureOffered() {
    const todaySess = s.sessions.find(x => x.date === s.today);
    if (todaySess?.offered_ids?.length) {
      s.offered = todaySess.offered_ids;
    } else if (!s.offered.length) {
      s.offered = rollOffered();
    }
  }

  function rollOffered() {
    const active = s.tasks.filter(t => !t.archived);
    const isOnboarding = !s.hasCompletedOnboarding && s.onboardingRitualCount < 2;
    if (isOnboarding && s.onboardingRitualCount === 0) {
      // Ritual 1: 5 random common only
      const common = active.filter(t => t.type === 'common');
      return shuffle(common).slice(0, Math.min(5, common.length)).map(t => t.id);
    } else if (isOnboarding && s.onboardingRitualCount === 1) {
      // Ritual 2: 4 random common + 1 random legendary
      const common = active.filter(t => t.type === 'common');
      const legendary = active.filter(t => t.type === 'legendary');
      const pool = [
        ...shuffle(common).slice(0, Math.min(4, common.length)),
        ...shuffle(legendary).slice(0, Math.min(1, legendary.length)),
      ];
      return shuffle(pool).map(t => t.id);
    }
    return shuffle(active).slice(0, Math.min(5, active.length)).map(t => t.id);
  }

  /* ── Render ── */
  const GLOW_START = Date.now();
  let revealTimeoutId = null;
  let ftueTransitionDir = 0; // non-zero during slide transition so htmlSlides() can pre-hide incoming content
  // Per-task duration: 2.0s – 3.2s, derived from ID
  function glowDuration(id) {
    let h = 0;
    for (const c of String(id)) h = ((h << 5) - h + c.charCodeAt(0) + 7) | 0;
    return 2000 + (Math.abs(h) % 1200);
  }

  // Returns a stable per-task phase offset so re-renders don't reset the animation
  function glowDelay(id) {
    let h = 0;
    for (const c of String(id)) h = ((h << 5) - h + c.charCodeAt(0)) | 0;
    const dur = glowDuration(id);
    const phase = Math.abs(h) % dur;
    const elapsed = (Date.now() - GLOW_START) % dur;
    return (phase + elapsed) % dur;
  }

  function render() {
    const screen = s.tab === 'history' ? 'history'
                 : s.tab === 'tasks'   ? 'tasks'
                 : s.tab === 'store'   ? 'store'
                 : getScreen();
    document.body.classList.toggle('mythic-bg', screen === 'pick' && s.picked.length === 5);
    document.body.classList.toggle('no-scroll', !!s.ftueScreen);
    document.getElementById('app').innerHTML = buildHtml(screen);
    document.querySelectorAll('.tab-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.tab === s.tab));
    // Tab locking during onboarding
    document.getElementById('tab-history')?.classList.toggle('tab-locked', s.onboardingRitualCount < 1);
    document.getElementById('tab-store')?.classList.toggle('tab-locked', s.onboardingRitualCount < 2);
    // Hide tab bar during FTUE
    const tabBar = document.getElementById('tab-bar');
    if (tabBar) tabBar.style.display = s.ftueScreen ? 'none' : '';
    // Sync per-task glow phases via CSS custom property (used by ::before)
    document.querySelectorAll('[data-glow-id]').forEach(el => {
      const id = el.dataset.glowId;
      el.style.setProperty('--glow-duration', `${glowDuration(id)}ms`);
      el.style.setProperty('--glow-delay', `-${glowDelay(id)}ms`);
    });
    // Dynamic plan tab: update icon/label and mythic glow based on active plan
    const plan = activePlan();
    const planTasks     = plan ? (plan.picked_ids || []) : [];
    const planCompleted = plan ? (plan.completed_ids || []) : [];
    const isPlanDone    = plan?.status === 'done';
    const isPlanActive  = plan?.status === 'active';
    const isMythicPlan  = isPlanActive && planTasks.length === 5;
    const isDoneForToday = isPlanDone;
    const todayBtn = document.querySelector('.tab-btn[data-tab="today"]');
    if (todayBtn) {
      const iconEl  = todayBtn.querySelector('.tab-icon');
      const labelEl = todayBtn.querySelector('#tab-today-label');
      if (isDoneForToday) {
        if (iconEl)  iconEl.textContent  = '🤝';
        if (labelEl) labelEl.textContent = 'Honored';
      } else if (isPlanActive) {
        if (iconEl)  iconEl.textContent  = isMythicPlan ? '🔱' : '🧿';
        if (labelEl) labelEl.textContent = 'Active';
      } else {
        if (iconEl)  iconEl.textContent  = '🎲';
        if (labelEl) labelEl.textContent = 'Ritual';
      }
      todayBtn.classList.toggle('mythic-active', isMythicPlan);
    }
    bind(screen);
  }

  function buildHtml(screen) {
    if (screen === 'loading')   return `<div class="loading">Loading…</div>`;
    if (screen === 'splash')    return htmlSplash();
    if (screen === 'slides')    return htmlSlides();
    if (screen === 'history')   return htmlHistory();
    if (screen === 'store')     return s.storeScreen === 'craft' ? htmlCraft() : htmlStore();
    if (screen === 'tasks')     return s.profileScreen === 'taskpool' ? htmlTaskPool() : s.profileScreen === 'storemanage' ? htmlStoreManage() : htmlProfile();
    if (screen === 'concluded') return htmlConcluded();
    if (screen === 'reward')    return htmlReward();
    if (screen === 'bad-luck')  return htmlBadLuck();
    if (screen === 'pick')      return htmlPick();
    return htmlActive();
  }

  /* ── FTUE Splash ── */
  const FTUE_SLIDES = [
    { emoji: '🧿', text: 'Honor your Ritual by completing all daily acts' },
    { emoji: '🕌', text: 'Build your record, earn tokens and splurge at the Bazaar' },
    { emoji: '☠️', text: 'But beware, one incomplete act breaks the entire Ritual' },
    { emoji: '🎲', text: "Let's forge your first Ritual!" },
  ];

  function htmlSplash() {
    return `
      <div class="ftue-splash">
        <div class="splash-bg">
          <div class="splash-blob splash-blob-1"></div>
          <div class="splash-blob splash-blob-2"></div>
          <div class="splash-blob splash-blob-3"></div>
        </div>
        <div class="ftue-main" style="position:relative;z-index:1">
          <div style="transform:translateY(-30px)">
            <div class="ftue-splash-title">Ritual</div>
          </div>
        </div>
        <div class="ftue-footer" style="position:relative;z-index:1">
          <button class="btn-primary" id="btn-ftue-begin">Let's Begin</button>
        </div>
      </div>`;
  }

  function htmlSlides() {
    const slide = FTUE_SLIDES[s.ftueSlide];
    const isLast = s.ftueSlide === FTUE_SLIDES.length - 1;
    const enterX = ftueTransitionDir > 0 ? '56px' : '-56px';
    const textStyle = ftueTransitionDir !== 0 ? ` style="opacity:0;transform:translateX(${enterX})"` : '';
    return `
      <div class="ftue-slides">
        <div class="ftue-main">
          <div class="ftue-slide-emoji">${slide.emoji}</div>
          <div class="ftue-slide-text"${textStyle}>${slide.text}</div>
          <div class="ftue-dots">
            ${FTUE_SLIDES.map((_, i) => `<div class="ftue-dot${i === s.ftueSlide ? ' active' : ''}"></div>`).join('')}
          </div>
        </div>
        <div class="ftue-footer">
          ${isLast
            ? `<button class="btn-primary" id="btn-ftue-roll">Roll Acts →</button>`
            : `<button class="btn-primary" id="btn-ftue-next">Next</button>`}
        </div>
      </div>`;
  }

  /* ── Pick ── */
  function htmlPick() {
    const isOnboarding = !s.hasCompletedOnboarding && s.onboardingRitualCount < 2;
    const orc = s.onboardingRitualCount;
    const maxPicks = isOnboarding ? (orc === 0 ? 1 : 2) : 5;
    const minPicks = maxPicks; // onboarding: exactly min; normal: min 3 but max 5

    if (s.planBuildState === 'generate') {
      return `
        <div class="generate-screen">
          <div class="generate-emoji">🎲</div>
          <div class="generate-title">Forge Ritual</div>
          <div class="generate-sub">${fmtDate(s.today)}</div>
          <button class="btn-primary" id="btn-generate">Roll Acts →</button>
        </div>`;
    }

    ensureOffered();
    const tasks = s.offered.map(id => getTask(id)).filter(Boolean);
    const n = s.picked.length;
    const isRevealing = s.planBuildState === 'revealing';
    const isMythic = !isOnboarding && n === 5;
    const canStart = isOnboarding ? n === maxPicks : n >= 3;
    const countLabel = isOnboarding
      ? `Committed: <strong>${n} / ${maxPicks}</strong>`
      : `Committed: <strong>${n} / 3</strong>`;
    const rerollDisabled = isRevealing || s.wallet.common < 1;
    const rerollLabel = `↺ Re-Roll Acts <span style="font-weight:400;font-size:0.8rem">x1</span>${rarityTag('common')}`;
    const showReroll = !isOnboarding;
    return `
      <div class="section-header">
        <div class="section-title">Forge Ritual</div>
        <div class="section-sub">${fmtDate(s.today)}</div>
      </div>
      <div class="pick-count${isMythic?' mythic-pick':''}">${countLabel}</div>
      ${tasks.map((t, i) => `
        <div class="task-card${t.type==='legendary'?' legendary-card':''}${s.picked.includes(t.id)?' selected':''}${isRevealing?' task-card-reveal':''}" data-pick="${t.id}"${t.type==='legendary'?' data-glow-id="'+t.id+'"':''} style="${isRevealing?`animation-delay:${500 + i*500}ms;`:''}${!isOnboarding&&n>=5&&!s.picked.includes(t.id)?'opacity:0.45;pointer-events:none':''}">
          <div class="task-card-top">
            <div class="task-title">${t.title}</div>
            ${rarityTag(t.type)}
          </div>
          <div class="task-desc">${t.description}</div>
        </div>`).join('')}
      <div style="height:16px"></div>
      <button class="btn-primary" id="btn-start"${canStart?'':' disabled'}>Begin Ritual →</button>
      ${showReroll ? `<button class="btn-reroll" id="btn-reroll"${rerollDisabled?' disabled':''}>${rerollLabel}</button>` : ''}`;
  }

  /* ── Active ── */
  function htmlActive() {
    const todaySess = activePlan();
    if (!todaySess) return '';
    const tasks = (todaySess.picked_ids || []).map(id => getTaskForHistory(todaySess, id)).filter(Boolean);
    const completedIds = todaySess.completed_ids || [];
    const isMythic = tasks.length === 5;

    // ── Done-for-today (already submitted) ──
    if (todaySess.status === 'done') {
      return `
        <div class="home-header">
          <div class="home-emoji">🤝</div>
          <div class="home-title">Ritual Honored</div>
          <div class="home-sub">Come back tomorrow</div>
        </div>
        <div class="tasks-label">Committed Acts</div>
        ${tasks.map(t => {
          const done = completedIds.includes(t.id);
          return `
          <div class="active-task${done?' completed':' task-incomplete'} type-${t.type}" style="cursor:default">
            <div class="active-task-row">
              ${done
                ? `<div class="active-task-check">✓</div>`
                : `<div class="active-task-check check-x">✕</div>`}
              <div class="active-task-info">
                <div class="active-task-title">${t.title}</div>
                <div class="active-task-desc">${t.description}</div>
              </div>
              ${rarityTag(t.type)}
            </div>
          </div>`;
        }).join('')}
        ${localStorage.getItem('showTestingTools') === 'true' ? `<button class="btn-danger-ghost" id="btn-restart">↺ Restart Day</button>` : ''}`;
    }

    // ── Active plan ──
    const allDone = tasks.length > 0 && tasks.every(t => completedIds.includes(t.id));
    const fmtHour = h => h === 0 ? '12:00am' : h < 12 ? `${h}:00am` : h === 12 ? '12:00pm' : `${h-12}:00pm`;
    const resetStr = fmtHour(RESET_HOUR);
    const deadlineDay = new Date().getHours() < RESET_HOUR ? 'today' : 'tomorrow';
    return `
      <div class="home-header">
        <div class="home-emoji">${isMythic ? '🔱' : '🧿'}</div>
        <div class="home-title"${isMythic ? ` style="color:var(--mythic)"` : ''}>${isMythic ? 'Mythical Ritual' : 'Daily Ritual'}</div>
        <div class="home-sub">All acts must be completed by ${resetStr} ${deadlineDay}</div>
      </div>
      <div class="tasks-label">Committed Acts</div>
      ${tasks.map(t => {
        const done = completedIds.includes(t.id);
        const confirming = s.confirmTask === t.id;
        const glowClass = t.type === 'legendary' && !done ? ' legendary-glow' : '';
        const glowIdAttr = t.type === 'legendary' && !done ? ` data-glow-id="${t.id}"` : '';
        return `
        <div class="active-task${done?' completed':''} type-${t.type}${glowClass}${confirming?' selected':''}" data-confirm-task="${t.id}"${glowIdAttr}>
          <div class="active-task-row">
            ${done
              ? `<div class="active-task-check">✓</div>`
              : `<div class="active-task-dot dot-${t.type}"></div>`}
            <div class="active-task-info">
              <div class="active-task-title">${t.title}</div>
              <div class="active-task-desc">${t.description}</div>
            </div>
            ${rarityTag(t.type)}
          </div>
          ${confirming ? `
          <div class="task-confirm">
            <span class="task-confirm-text">Did you complete this?</span>
            <div style="display:flex;gap:8px">
              <button class="btn-confirm-no" data-confirm-no="${t.id}">No</button>
              <button class="btn-confirm-yes" data-confirm-yes="${t.id}">Yes ✓</button>
            </div>
          </div>` : ''}
        </div>`;
      }).join('')}
      ${allDone && !s.suppressSubmitCta ? `<div style="height:16px"></div>
      <button class="btn-primary" id="btn-submit-results" style="animation:fade-in 0.3s ease forwards">Submit Results</button>` : ''}
      ${localStorage.getItem('showTestingTools') === 'true' ? `<button class="btn-danger-ghost" id="btn-restart">↺ Restart Day</button>` : ''}`;
  }

  /* ── Grace-period: Concluded screen ── */
  function htmlConcluded() {
    const pending = s.sessions.find(x => x.date !== s.today && x.status === 'active');
    if (!pending) return '';
    const tasks = (pending.picked_ids || []).map(id => getTaskForHistory(pending, id)).filter(Boolean);
    const completedIds = pending.completed_ids || [];
    const isMythic = tasks.length === 5;
    const graceEndHour = RESET_HOUR + GRACE_HOURS;
    const fmtHour = h => h === 0 ? '12:00am' : h < 12 ? `${h}:00am` : h === 12 ? '12:00pm' : `${h-12}:00pm`;
    const graceEndStr = fmtHour(graceEndHour >= 24 ? graceEndHour - 24 : graceEndHour);
    const planType = isMythic ? 'mythical' : 'daily';
    return `
      <div class="home-header">
        <div class="home-emoji">${isMythic ? '🔱' : '🧿'}</div>
        <div class="home-title"${isMythic ? ` style="color:var(--mythic)"` : ''}>${isMythic ? 'Mythical Ritual Concluded' : 'Daily Ritual Concluded'}</div>
        <div class="home-sub">Please submit your ${planType} ritual results. The day resets at ${graceEndStr}.</div>
      </div>
      <div class="tasks-label">Yesterday's Acts</div>
      ${tasks.map(t => {
        const done       = completedIds.includes(t.id);
        const declined   = s.reviewDeclined.includes(t.id);
        const unanswered = !done && !declined;
        const confirming = s.graceConfirmTask === t.id;
        const showPrompt = unanswered || confirming;
        const glowClass  = t.type === 'legendary' && unanswered && !confirming ? ' legendary-glow' : '';
        const glowAttr   = t.type === 'legendary' && unanswered && !confirming ? ` data-glow-id="${t.id}"` : '';
        return `
        <div class="active-task${done&&!confirming?' completed':declined&&!confirming?' task-declined':''} type-${t.type}${glowClass}${confirming?' selected':''}" data-grace-tap="${t.id}"${glowAttr}>
          <div class="active-task-row">
            ${done && !confirming
              ? `<div class="active-task-check">✓</div>`
              : declined && !confirming
                ? `<div class="active-task-check check-x">✕</div>`
                : `<div class="active-task-dot dot-${t.type}"></div>`}
            <div class="active-task-info">
              <div class="active-task-title">${t.title}</div>
              <div class="active-task-desc">${t.description}</div>
            </div>
            ${rarityTag(t.type)}
          </div>
          ${showPrompt ? `
          <div class="task-confirm">
            <span class="task-confirm-text">Did you complete this?</span>
            <div style="display:flex;gap:8px">
              <button class="btn-confirm-no btn-red" data-grace-no="${t.id}">No ✕</button>
              <button class="btn-confirm-yes" data-grace-yes="${t.id}">Yes ✓</button>
            </div>
          </div>` : ''}
        </div>`;
      }).join('')}
      <div style="height:16px"></div>
      <button class="btn-primary" id="btn-submit-grace"${tasks.every(t => completedIds.includes(t.id) || s.reviewDeclined.includes(t.id)) ? '' : ' disabled'}>Submit Results</button>`;
  }

  /* ── Claim Tokens screen ── */
  function htmlReward() {
    const r = s.pendingReward || { common: 0, legendary: 0, mythic: 0 };
    const tokenRows = [
      r.common    ? `<div class="reward-token-row">+${r.common} ${rarityTag('common')}</div>`    : '',
      r.legendary ? `<div class="reward-token-row">+${r.legendary} ${rarityTag('legendary')}</div>` : '',

      <div class="reward-screen" style="background:var(--accent)">
        <div id="reward-floaters" style="position:absolute;inset:0;z-index:0;pointer-events:none;overflow:visible;"></div>
        <div style="position:relative;z-index:1;width:100%;max-width:440px;display:flex;flex-direction:column;align-items:stretch">
          <div class="reward-emoji">🤝</div>
          <div class="reward-title">Ritual Honored</div>
          <div class="reward-tokens">${tokenRows || '<div class="reward-token-row" style="color:rgba(255,255,255,0.6)">No tokens earned</div>'}</div>
          <button class="btn-claim" id="btn-claim-tokens">Claim Tokens</button>
        </div>
      </div>`;
  }

  /* ── Better Luck Next Time screen ── */
  function htmlBadLuck() {
    return `
      <div class="reward-screen" style="background:var(--accent)">
        <div class="reward-emoji">😔</div>
        <div class="reward-title">Better Luck Next Time</div>
        <div class="reward-earned">All acts must be completed in order to earn tokens.</div>
        <button class="btn-claim" id="btn-acknowledge">Got It</button>
      </div>`;
  }

  /* ── Task Pool tab ── */
  function htmlTaskPool() {
    const active    = s.tasks.filter(t => !t.archived);
    const common    = active.filter(t => t.type === 'common');
    const legendary = active.filter(t => t.type === 'legendary');
    const isAdding  = s.editingTask?.id === '';
    const editing   = s.poolEditMode;
    const canAdd    = s.wallet.legendary >= 1;

    // Compute per-task stats from session history
    const stats = {};
    for (const sess of s.sessions) {
      if (sess.status === 'draft') continue;
      for (const id of (sess.picked_ids || [])) {
        if (!stats[id]) stats[id] = { chosen: 0, completed: 0 };
        stats[id].chosen++;
      }
      for (const id of (sess.completed_ids || [])) {
        if (!stats[id]) stats[id] = { chosen: 0, completed: 0 };
        stats[id].completed++;
      }
    }

      const isEditing  = s.editingTask?.id === t.id;

      return `

  function animateCraft(result) {
    const gainedId = result === 'legendary' ? 'craft-wallet-legendary' : 'craft-wallet-mythic';
    const chip = document.getElementById(gainedId);
    if (!chip) return;
    chip.style.position = 'relative';
    chip.style.overflow = 'hidden';
    chip.animate(
      [{ transform: 'scale(1)' }, { transform: 'scale(1.12)' }, { transform: 'scale(1)' }],
      { duration: 320, easing: 'ease-out' }
    );
    const ribbon = document.createElement('div');
    ribbon.style.cssText = 'position:absolute;top:-20%;left:0;width:40%;height:140%;background:linear-gradient(to right,transparent,rgba(255,255,255,0.7),transparent);transform:skewX(-25deg) translateX(-250%);pointer-events:none;';
    chip.appendChild(ribbon);
    ribbon.animate(
      [{ transform: 'skewX(-25deg) translateX(-250%)' }, { transform: 'skewX(-25deg) translateX(420%)' }],
      { duration: 500, easing: 'cubic-bezier(0.25,0.1,0.25,1)', fill: 'forwards' }
    ).onfinish = () => { ribbon.remove(); chip.style.overflow = ''; };
  }
