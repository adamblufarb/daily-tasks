  /* ── FTUE slide transition (dir: +1 forward, -1 backward) ── */
  function ftueSlideTransition(dir) {
    const HALF = 350;
    const text = document.querySelector('.ftue-slide-text');

    // Phase 1 — exit text only (emoji cuts instantly)
    if (text) {
      text.style.transition = 'transform 0.35s ease, opacity 0.35s ease';
      text.style.transform = `translateX(${dir > 0 ? '-56px' : '56px'})`;
      text.style.opacity = '0';
    }

    setTimeout(() => {
      s.ftueSlide += dir;
      // ftueTransitionDir tells htmlSlides() to pre-render new elements hidden/offset
      ftueTransitionDir = dir;
      render();
      ftueTransitionDir = 0;

      // Phase 2 — animate in after two rAF cycles (guarantees the pre-hidden elements have painted)
      // Phase 2 — animate text in after two rAF cycles
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          const newText = document.querySelector('.ftue-slide-text');
          if (newText) {
            newText.style.transition = 'transform 0.35s ease, opacity 0.35s ease';
            newText.style.transform = 'translateX(0)';
            newText.style.opacity = '1';
          }
        });
      });
    }, HALF);
  }

  /* ── Bind ── */
  function bind(screen) {

    if (screen === 'splash') {
      document.getElementById('btn-ftue-begin')?.addEventListener('click', () => {
        s.ftueScreen = 'slides';
        s.ftueSlide = 0;
        render();
      });
    }

    if (screen === 'slides') {
      const el = document.querySelector('.ftue-slides');
      let touchStartX = 0;
      el?.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
      el?.addEventListener('touchend', e => {
        const dx = e.changedTouches[0].clientX - touchStartX;
        if (Math.abs(dx) > 50) {
          if (dx < 0 && s.ftueSlide < FTUE_SLIDES.length - 1) ftueSlideTransition(1);
          else if (dx > 0 && s.ftueSlide > 0) ftueSlideTransition(-1);
        }
      }, { passive: true });

      document.getElementById('btn-ftue-next')?.addEventListener('click', () => {
        if (s.ftueSlide < FTUE_SLIDES.length - 1) ftueSlideTransition(1);
      });

      document.getElementById('btn-ftue-roll')?.addEventListener('click', async () => {
        s.ftueScreen = null;
        s.offered = rollOffered();
        s.picked = [];
        s.planBuildState = 'revealing';
        render();
        revealTimeoutId = setTimeout(() => { revealTimeoutId = null; s.planBuildState = 'pick'; render(); }, 500 + (s.offered.length - 1) * 500 + 450);
        await api('POST', '/api/sessions', {
          type: 'draft', id: `draft-${s.today}`, date: s.today,
          offered_ids: s.offered, picked_ids: [], completed_ids: [], status: 'draft',
        });
      });
    }

    if (screen === 'store') {
      if (s.storeScreen === 'store') {
        document.getElementById('btn-goto-craft')?.addEventListener('click', () => {
          s.storeScreen = 'craft'; render();
        });
        document.querySelectorAll('[data-store-select]').forEach(card =>
          card.addEventListener('click', () => {
            const id = card.dataset.storeSelect;
            s.selectedStoreItem = s.selectedStoreItem === id ? null : id;
            render();
          }));
        document.getElementById('btn-purchase')?.addEventListener('click', () => {
          if (s.selectedStoreItem) purchaseItem(s.selectedStoreItem);
        });
        document.getElementById('btn-back-store')?.addEventListener('click', () => {
          s.showPurchasedScreen = false;
          render();
        });
        document.getElementById('btn-restore-purchase')?.addEventListener('click', async () => {
          s.lastPurchaseDate = null;
          s.lastPurchasedItem = null;
          s.selectedStoreItem = null;
          s.showPurchasedScreen = false;
          render();
          await saveWallet();
        });
      }
      if (s.storeScreen === 'craft') {
        document.getElementById('btn-back-craft')?.addEventListener('click', () => {
          s.storeScreen = 'store'; render();
        });
        document.getElementById('btn-craft-legendary')?.addEventListener('click', () => {
          if (s.wallet.common < 3) return;
          s.wallet.common -= 3;
          s.wallet.legendary += 1;
          s.lastCraftResult = 'legendary';
          render();
          saveWallet();
        });
        document.getElementById('btn-craft-mythical')?.addEventListener('click', () => {
          if (s.wallet.legendary < 3) return;
          s.wallet.legendary -= 3;
          s.wallet.mythic += 1;
          s.lastCraftResult = 'mythical';
          render();
          saveWallet();
        });
        if (s.lastCraftResult) {
          const result = s.lastCraftResult;
          s.lastCraftResult = null;
          requestAnimationFrame(() => animateCraft(result));
        }
      }
    }

    if (screen === 'history') {
      document.getElementById('btn-open-profile')?.addEventListener('click', () => {
        s.tab = 'tasks';
        s.profileScreen = 'menu';
        render();
      });
    }

    if (screen === 'concluded') {
      document.querySelectorAll('[data-grace-tap]').forEach(el =>
        el.addEventListener('click', () => {
          const id = el.dataset.graceTap;
          s.graceConfirmTask = s.graceConfirmTask === id ? null : id;
          render();
        }));
      document.querySelectorAll('[data-grace-yes]').forEach(el =>
        el.addEventListener('click', e => {
          e.stopPropagation();
          s.graceConfirmTask = null;
          graceCompleteTask(el.dataset.graceYes);
        }));
      document.querySelectorAll('[data-grace-no]').forEach(el =>
        el.addEventListener('click', e => {
          e.stopPropagation();
          s.graceConfirmTask = null;
          graceDeclineTask(el.dataset.graceNo);
        }));
      document.getElementById('btn-submit-grace')?.addEventListener('click', submitGrace);
    }

    if (screen === 'reward') {
      document.getElementById('btn-claim-tokens')?.addEventListener('click', claimTokens);
      const r = s.pendingReward || {};
      const floatEmojis = r.mythic > 0
        ? ['🔮','🍇','🪻','🦄','🧞‍♀️','🧬','😈']
        : r.legendary > 0
        ? ['🦧','🐦‍🔥','🐅','🔥','🍄‍🟫','🥃','🏈']
        : ['🏐','🤍','🚰','🏁','🐏','🕊️','🌪️'];
      startRewardFloaters(floatEmojis);
    }

    if (screen === 'bad-luck') {
      document.getElementById('btn-acknowledge')?.addEventListener('click', async () => {
        s.pendingReward = null;
        s.overlayScreen = null;
        let advancedOnboarding = false;
        if (!s.hasCompletedOnboarding) {
          s.onboardingRitualCount++;
          if (s.onboardingRitualCount >= 3) s.hasCompletedOnboarding = true;
          advancedOnboarding = true;
        }
        render(); // immediate transition
        if (advancedOnboarding) {
          if (s.onboardingRitualCount === 1 && !s.hasShownRecordTutorial)
            setTimeout(() => startTutorial('record'), 500);
          else if (s.onboardingRitualCount === 2 && !s.hasShownBazaarTutorial)
            setTimeout(() => startTutorial('bazaar'), 500);
          await saveSettings();
        }
      });
    }

    if (screen === 'pick') {
      document.getElementById('btn-generate')?.addEventListener('click', async () => {
        s.offered = rollOffered();
        s.picked = [];
        s.planBuildState = 'revealing';
        render();
        revealTimeoutId = setTimeout(() => { revealTimeoutId = null; s.planBuildState = 'pick'; render(); }, 500 + (s.offered.length - 1) * 500 + 450);
        await api('POST', '/api/sessions', {
          type: 'draft', id: `draft-${s.today}`, date: s.today,
          offered_ids: s.offered, picked_ids: [], completed_ids: [], status: 'draft',
        });
      });
      document.querySelectorAll('[data-pick]').forEach(el =>
        el.addEventListener('click', () => {
          const id = el.dataset.pick;
          if (s.planBuildState === 'revealing') {
            clearTimeout(revealTimeoutId);
            revealTimeoutId = null;
            s.planBuildState = 'pick';
          }
          const isOnboarding = !s.hasCompletedOnboarding && s.onboardingRitualCount < 2;
          if (s.picked.includes(id)) {
            // Always allow deselect
            s.picked = s.picked.filter(x => x !== id);
          } else if (isOnboarding && s.onboardingRitualCount === 0) {
            // Ritual 1 — radio: replace any existing selection
            s.picked = [id];
          } else if (isOnboarding && s.onboardingRitualCount === 1) {
            // Ritual 2 — FIFO: drop oldest when at max of 2
            if (s.picked.length < 2) s.picked = [...s.picked, id];
            else s.picked = [s.picked[1], id];
          } else {
            // Normal: add up to 5
            if (s.picked.length < 5) s.picked.push(id);
          }
          render();
        }));
      document.getElementById('btn-start')?.addEventListener('click', startDay);
      document.getElementById('btn-reroll')?.addEventListener('click', async () => {
        if (s.planBuildState === 'revealing') return;
        if (s.wallet.common < 1) return;
        s.wallet.common--;
        s.offered = rollOffered();
        s.picked = [];
        s.planBuildState = 'revealing';
        render();
        revealTimeoutId = setTimeout(() => { revealTimeoutId = null; s.planBuildState = 'pick'; render(); }, 500 + (s.offered.length - 1) * 500 + 450);
        await Promise.all([
          api('POST', '/api/sessions', {
            type: 'draft', id: `draft-${s.today}`, date: s.today,
            offered_ids: s.offered, picked_ids: [], completed_ids: [], status: 'draft',
          }),
          saveWallet(),
        ]);
      });
    }

    if (screen === 'active') {
      document.querySelectorAll('[data-confirm-task]').forEach(el =>
        el.addEventListener('click', () => {
          const taskId = el.dataset.confirmTask;
          s.confirmTask = s.confirmTask === taskId ? null : taskId;
          render();
        }));
      document.querySelectorAll('[data-confirm-no]').forEach(btn =>
        btn.addEventListener('click', e => {
          e.stopPropagation();
          s.confirmTask = null;
          uncompleteTask(btn.dataset.confirmNo);
        }));
      document.querySelectorAll('[data-confirm-yes]').forEach(btn =>
        btn.addEventListener('click', e => {
          e.stopPropagation();
          const taskId      = btn.dataset.confirmYes;
          const sess        = activePlan();
          const alreadyDone = (sess?.completed_ids || []).includes(taskId);
          const task        = getTaskForHistory(sess, taskId);
          const isCommon    = !alreadyDone && task?.type === 'common';
          const isLegendary = !alreadyDone && task?.type === 'legendary';
          if (isCommon || isLegendary) {
            const EMOJIS  = isCommon
              ? ['🏐','🤍','🚰','🏁','🐏','🕊️','🌪️']
              : ['🦧','🐦‍🔥','🐅','🔥','🍄‍🟫','🥃','🏈'];
            const COUNT   = isCommon ? 14 : 28;
            const PEAK    = 1.08;
            const SNAP_CB = isCommon
              ? 'cubic-bezier(0.34,1.2,0.64,1)'
              : 'cubic-bezier(0.34,1.5,0.64,1)';
            // Suppress Submit Results CTA if this completes the last task
            const willBeAllDone =
              (sess?.completed_ids || []).length + 1 >= (sess?.picked_ids || []).length;
            if (willBeAllDone) s.suppressSubmitCta = true;
            // 1. State update first — card renders in completed state
            completeTask(taskId);
            const newCard = document.querySelector(`[data-confirm-task="${taskId}"]`);
            if (newCard) {
              newCard.style.zIndex   = '70';
              newCard.style.overflow = 'hidden';
              const GROW = 130, SHINE = 550, SNAP = 190;
              // 2. Card grows
              newCard.animate(
                [{ transform:'scale(1)' }, { transform:`scale(${PEAK})` }],
                { duration:GROW, easing:'ease-out', fill:'forwards' }
              ).onfinish = () => {
                // 3. Shine ribbon
                const ribbon = document.createElement('div');
                ribbon.style.cssText = 'position:absolute;top:-20%;left:0;width:40%;height:140%;background:linear-gradient(to right,transparent,rgba(255,255,255,0.85),transparent);transform:skewX(-25deg) translateX(-250%);pointer-events:none;';
                newCard.appendChild(ribbon);
                ribbon.animate(
                  [{ transform:'skewX(-25deg) translateX(-250%)' }, { transform:'skewX(-25deg) translateX(420%)' }],
                  { duration:SHINE, easing:'cubic-bezier(0.25,0.1,0.25,1)', fill:'forwards' }
                ).onfinish = () => {
                  ribbon.remove();
                  // 4. Burst + glow at moment of slam
                  const burstAt = Date.now();
                  burstParticles(newCard, EMOJIS, COUNT);
                  if (isLegendary) legendaryGlowBurst(newCard);
                  // 5. Snap back; after snap reveal CTA and keep particle z-index correct
                  newCard.animate(
                    [{ transform:`scale(${PEAK})` }, { transform:'scale(1)' }],
                    { duration:SNAP, easing:SNAP_CB, fill:'forwards' }
                  ).onfinish = () => {
                    newCard.style.overflow = '';
                    if (willBeAllDone) {
                      s.suppressSubmitCta = false;
                      render();
                      // Re-elevate the freshly rendered card for remaining particle lifetime
                      const freshCard = document.querySelector(`[data-confirm-task="${taskId}"]`);
                      if (freshCard) {
                        freshCard.style.zIndex = '70';
                        const remaining = Math.max(0, 1500 - (Date.now() - burstAt));
                        setTimeout(() => { if (freshCard.isConnected) freshCard.style.zIndex = ''; }, remaining);
                      }
                    } else {
                      setTimeout(() => { if (newCard.isConnected) newCard.style.zIndex = ''; }, 1500 - SNAP);
                    }
                  };
                };
              };
            }
          } else {
            completeTask(taskId);
          }
        }));
      document.getElementById('btn-submit-results')?.addEventListener('click', submitResults);
      document.getElementById('btn-restart')?.addEventListener('click', restartDay);
    }

    if (screen === 'tasks') {
      // Profile menu navigation
      document.getElementById('btn-profile-taskpool')?.addEventListener('click', () => {
        s.profileScreen = 'taskpool'; s.poolEditMode = false; render();
      });
      document.getElementById('btn-profile-storemanage')?.addEventListener('click', () => {
        s.profileScreen = 'storemanage'; s.editingStoreItem = null; s.storeEditMode = false; render();
      });

      // Back from task pool → Profile menu
      document.getElementById('btn-back-profile')?.addEventListener('click', () => {
        s.profileScreen = 'menu'; s.poolEditMode = false; s.editingTask = null; s.deletingTask = null; s.confirmEditTask = null; render();
      });
      document.getElementById('btn-done-editing')?.addEventListener('click', () => {
        s.poolEditMode = false; s.editingTask = null; s.deletingTask = null; s.confirmEditTask = null; render();
      });

      // Back from store manage → Profile menu
      document.getElementById('btn-back-storemanage')?.addEventListener('click', () => {
        s.profileScreen = 'menu'; s.editingStoreItem = null; s.storeEditMode = false; render();
      });

      document.getElementById('btn-sign-out')?.addEventListener('click', () => clerk.signOut());

      // Reset records flow
      document.getElementById('btn-show-reset')?.addEventListener('click', () => {
        s.showResetConfirm = true; render();
      });
      document.getElementById('btn-cancel-reset')?.addEventListener('click', () => {
        s.showResetConfirm = false; render();
      });
      document.getElementById('btn-confirm-reset')?.addEventListener('click', async () => {
        const val = document.getElementById('reset-confirm-input')?.value.trim().toLowerCase();
        if (val !== 'reset') {
          const input = document.getElementById('reset-confirm-input');
          if (input) { input.style.borderColor = 'var(--danger)'; input.focus(); }
          return;
        }
        await resetEverything();
      });

      // Reset hour select (Profile menu)
      document.getElementById('select-reset-hour')?.addEventListener('change', async e => {
        RESET_HOUR = parseInt(e.target.value);
        s.today = todayStr();
        render();
        await saveSettings();
      });

      // Store: add/edit offerings
      document.getElementById('btn-add-store-item')?.addEventListener('click', () => {
        s.editingStoreItem = { id: '', name: '', desc: '', cost: 1, rarity: 'mythic' }; render();
      });
      document.getElementById('btn-enter-store-edit')?.addEventListener('click', async () => {
        s.wallet.legendary = Math.max(0, s.wallet.legendary - 1);
        s.storeEditMode = true;
        render();
        await saveWallet();
      });
      document.getElementById('btn-done-store-editing')?.addEventListener('click', () => {
        s.storeEditMode = false; s.editingStoreItem = null; render();
      });
      document.querySelectorAll('[data-edit-store]').forEach(el =>
        el.addEventListener('click', () => {
          const items = s.storeItems.length ? s.storeItems : STORE_ITEMS;
          const item = items.find(x => x.id === el.dataset.editStore);
          s.editingStoreItem = item ? { ...item } : null; render();
        }));
      document.querySelector('[data-cancel-store-edit]')?.addEventListener('click', () => {
        const wasEditing = s.editingStoreItem?.id !== '';
        s.editingStoreItem = null;
        if (wasEditing) s.storeEditMode = false;
        render();
      });
      document.querySelector('[data-save-store]')?.addEventListener('click', () => {
        const name = document.getElementById('si-name')?.value.trim();
        const desc = document.getElementById('si-desc')?.value.trim();
        const cost = parseInt(document.getElementById('si-cost')?.value) || 1;
        if (!name) return;
        saveStoreItem({ ...s.editingStoreItem, name, desc, cost, rarity: 'mythic' });
      });
      // Enter edit mode — deduct legendary immediately
      document.getElementById('btn-enter-edit-mode')?.addEventListener('click', async () => {
        s.wallet.legendary = Math.max(0, s.wallet.legendary - 1);
        s.poolEditMode = true;
        render();
        await saveWallet();
      });
      // Pick which act to edit (in edit mode)
      document.querySelectorAll('[data-edit-task]').forEach(el =>
        el.addEventListener('click', () => {
          const t = getTask(el.dataset.editTask);
          s.editingTask = t ? { ...t } : null;
          s.deletingTask = null;
          render();
        }));
      document.querySelector('[data-cancel-delete]')?.addEventListener('click', () => {
        s.deletingTask = null; render();
      });
      const confirmDelBtn = document.querySelector('[data-confirm-delete]');
      if (confirmDelBtn) confirmDelBtn.addEventListener('click', () => {
        deletePoolTask(confirmDelBtn.dataset.confirmDelete);
      });
      document.querySelectorAll('[data-set-type]').forEach(el =>
        el.addEventListener('click', () => {
          if (s.editingTask) {
            s.editingTask.title = document.getElementById('edit-title')?.value ?? s.editingTask.title;
            s.editingTask.description = document.getElementById('edit-desc')?.value ?? s.editingTask.description;
            s.editingTask.type = el.dataset.setType;
            render();
          }
        }));
      document.querySelector('[data-cancel-edit]')?.addEventListener('click', () => {
        s.editingTask = null; s.poolEditMode = false; render();
      });
      document.querySelector('[data-save-task]')?.addEventListener('click', () => {
        const title = document.getElementById('edit-title')?.value.trim();
        const description = document.getElementById('edit-desc')?.value.trim();
        if (!title || !s.editingTask?.type) return;
        savePoolTask({ ...s.editingTask, title, description });
      });
      document.getElementById('btn-add-task')?.addEventListener('click', () => {
        s.editingTask = { id: '', title: '', description: '', type: '' };
        render();
      });

      // Testing Tools toggle
      document.getElementById('toggle-testing')?.addEventListener('change', e => {
        localStorage.setItem('showTestingTools', e.target.checked);
        if (!e.target.checked) s.showResetConfirm = false;
        render();
      });
      // Token manipulation
      document.getElementById('btn-add-common')?.addEventListener('click', async () => {
        s.wallet.common++; render(); await saveWallet();
      });
      document.getElementById('btn-add-legendary')?.addEventListener('click', async () => {
        s.wallet.legendary++; render(); await saveWallet();
      });
      document.getElementById('btn-add-mythical')?.addEventListener('click', async () => {
        s.wallet.mythic++; render(); await saveWallet();
      });
      // Tutorial replay
      document.getElementById('btn-test-record')?.addEventListener('click', () => startTutorial('record'));
      document.getElementById('btn-test-bazaar')?.addEventListener('click', () => startTutorial('bazaar'));
    }
  }

  /* ── Today actions ── */
  async function saveSettings() {
    await api('PATCH', '/api/settings', {
      reset_hour: RESET_HOUR,
      has_completed_onboarding: s.hasCompletedOnboarding,
      onboarding_ritual_count: s.onboardingRitualCount,
      has_shown_record_tutorial: s.hasShownRecordTutorial,
      has_shown_bazaar_tutorial: s.hasShownBazaarTutorial,
    });
  }

  async function saveStoreItem(item) {
    const isNew = !item.id;
    if (isNew) item.id = `si-${Date.now()}`;
    if (isNew) {
      s.storeItems = [...(s.storeItems.length ? s.storeItems : STORE_ITEMS), item];
      s.wallet.legendary = Math.max(0, s.wallet.legendary - 1);
    } else {
      s.storeItems = (s.storeItems.length ? s.storeItems : STORE_ITEMS).map(x => x.id === item.id ? item : x);
    }
    s.editingStoreItem = null;
    s.storeEditMode = false;
    render();
    const saves = [api('POST', '/api/store-items', item)];
    if (isNew) saves.push(saveWallet());
    await Promise.all(saves);
  }

  async function deleteStoreItem(itemId) {
    s.storeItems = (s.storeItems.length ? s.storeItems : STORE_ITEMS).filter(x => x.id !== itemId);
    s.editingStoreItem = null;
    render();
    await api('DELETE', '/api/store-items', { id: itemId });
  }

  async function startDay() {
    const isOnboarding = !s.hasCompletedOnboarding && s.onboardingRitualCount < 2;
    const minPicks = isOnboarding ? (s.onboardingRitualCount === 0 ? 1 : 2) : 3;
    if (s.picked.length < minPicks) return;
    const pickedTasks = s.tasks.filter(t => s.picked.includes(t.id));
    const session = {
      id: Date.now().toString(),
      date: s.today,
      offered_ids: s.offered,
      picked_ids: s.picked.slice(),
      completed_ids: [],
      status: 'active',
      task_snapshots: pickedTasks,
    };
    s.sessions = s.sessions.filter(x => x.date !== s.today);
    s.sessions.push(session);
    s.activePlanId = session.id;
    s.picked = [];
    render();
    await api('POST', '/api/sessions', { type: 'start', ...session });
  }

  async function completeTask(taskId) {
    const todaySess = activePlan();
    if (!todaySess) return;
    const newCompleted = [...new Set([...(todaySess.completed_ids || []), taskId])];
    s.sessions = s.sessions.map(x => x.id === todaySess.id
      ? { ...x, completed_ids: newCompleted } : x);
    s.confirmTask = null;
    render();
    await api('PATCH', '/api/sessions', { id: todaySess.id, completed_ids: newCompleted });
  }

  async function uncompleteTask(taskId) {
    const todaySess = activePlan();
    if (!todaySess) return;
    const newCompleted = (todaySess.completed_ids || []).filter(id => id !== taskId);
    s.sessions = s.sessions.map(x => x.id === todaySess.id
      ? { ...x, completed_ids: newCompleted } : x);
    s.confirmTask = null;
    render();
    await api('PATCH', '/api/sessions', { id: todaySess.id, completed_ids: newCompleted });
  }

  async function submitResults() {
    const todaySess = activePlan();
    if (!todaySess) return;
    const tasks = (todaySess.picked_ids || []).map(id => getTaskForHistory(todaySess, id)).filter(Boolean);
    const completedIds = todaySess.completed_ids || [];
    const allCompleted = completedIds.length === tasks.length && tasks.length > 0;
    let earnedCommon = 0, earnedLegendary = 0, earnedMythic = 0;
    if (allCompleted) {
      if (tasks.length === 5) earnedMythic = 1;
      for (const id of completedIds) {
        const t = getTaskForHistory(todaySess, id);
        if (t?.type === 'legendary') earnedLegendary++; else earnedCommon++;
      }
    }
    s.pendingReward  = { common: earnedCommon, legendary: earnedLegendary, mythic: earnedMythic };
    s.overlayScreen  = allCompleted ? 'reward' : 'bad-luck';
    s.sessions = s.sessions.map(x => x.id === todaySess.id ? { ...x, status: 'done' } : x);
    render();
    await api('PATCH', '/api/sessions', { id: todaySess.id, status: 'done' });
  }

  async function claimTokens() {
    if (s.pendingReward) {
      s.wallet.common    += s.pendingReward.common;
      s.wallet.legendary += s.pendingReward.legendary;
      s.wallet.mythic    += s.pendingReward.mythic;
    }
    s.pendingReward = null;
    s.overlayScreen = null;
    let advancedOnboarding = false;
    if (!s.hasCompletedOnboarding) {
      s.onboardingRitualCount++;
      if (s.onboardingRitualCount >= 3) s.hasCompletedOnboarding = true;
      advancedOnboarding = true;
    }
    render(); // immediate transition — API saves happen in background
    if (advancedOnboarding) {
      if (s.onboardingRitualCount === 1 && !s.hasShownRecordTutorial)
        setTimeout(() => startTutorial('record'), 500);
      else if (s.onboardingRitualCount === 2 && !s.hasShownBazaarTutorial)
        setTimeout(() => startTutorial('bazaar'), 500);
    }
    const saves = [saveWallet()];
    if (advancedOnboarding) saves.push(saveSettings());
    await Promise.all(saves);
  }

  async function advanceOnboarding() {
    if (s.hasCompletedOnboarding) return;
    s.onboardingRitualCount++;
    if (s.onboardingRitualCount >= 3) s.hasCompletedOnboarding = true;
    await saveSettings();
  }

  /* ── Onboarding tutorials ── */

  const RECORD_TUTORIAL = [
    { type: 'tap-tab', tabId: 'tab-history', label: 'Record' },
    { type: 'info',    title: 'Eternal record of your Ritual glory' },
    { type: 'tap-el',  elId: 'btn-open-profile', label: 'Profile' },
    { type: 'highlight', elId: 'tutorial-settings-section', title: "Your Ritual ends at this time. You'll have 3 hours after to enter your acts results" },
    { type: 'highlight', elId: 'btn-profile-taskpool',      title: 'Your Act pool lives here, grow it as you level up', finish: true },
  ];

  const BAZAAR_TUTORIAL = [
    { type: 'tap-tab',   tabId: 'tab-store',                label: 'Bazaar' },
    { type: 'info',      title: 'Browse and spend your earned Tokens' },
    { type: 'highlight', elId: 'tutorial-wallet-common',    title: `Spend ${rarityTag('common')} Tokens to re-roll Acts when forging your Ritual` },
    { type: 'highlight', elId: 'tutorial-wallet-legendary', title: `Spend ${rarityTag('legendary')} Tokens to expand your Act Pool` },
    { type: 'highlight', elId: 'tutorial-wallet-mythic',    title: `Spend ${rarityTag('mythic')} Tokens on exclusive Offerings`, finish: true },
  ];

  function startTutorial(flow) {
    s.tutorialFlow = flow;
    s.tutorialStep = 0;
    renderTutorial();
  }

  function cleanupTutorial() {
    const tabBar = document.getElementById('tab-bar');
    if (tabBar) tabBar.style.zIndex = '';
    document.querySelectorAll('.tab-btn').forEach(b => { b.style.pointerEvents = ''; });
    ['tutorial-settings-section', 'btn-profile-taskpool', 'tutorial-store-wallet', 'tutorial-wallet-common', 'tutorial-wallet-legendary', 'tutorial-wallet-mythic', 'btn-open-profile'].forEach(id => {
      const el = document.getElementById(id);
      if (el) { el.style.position = ''; el.style.zIndex = ''; el.style.pointerEvents = ''; }
    });
    document.querySelector('meta[name="theme-color"]').content = '#f0f4ff';
  }

  function completeTutorial() {
    if (s.tutorialFlow === 'record') s.hasShownRecordTutorial = true;
    if (s.tutorialFlow === 'bazaar') s.hasShownBazaarTutorial = true;
    s.tutorialFlow = null;
    s.tutorialStep = 0;
    document.getElementById('tutorial-overlay')?.remove();
    cleanupTutorial();
    saveSettings();
  }

  function renderTutorial() {
    document.getElementById('tutorial-overlay')?.remove();
    cleanupTutorial();

    if (!s.tutorialFlow) return;
    const steps = s.tutorialFlow === 'record' ? RECORD_TUTORIAL : BAZAAR_TUTORIAL;
    const step  = steps[s.tutorialStep];
    if (!step) { completeTutorial(); return; }

    const overlay = document.createElement('div');
    overlay.id = 'tutorial-overlay';
    overlay.style.cssText = 'position:fixed;inset:0;z-index:300;pointer-events:all;';
    // Backdrop for tap-target and highlight steps; plain info steps keep the screen visible
    if (step.type === 'tap-tab' || step.type === 'tap-el' || step.type === 'highlight') {
      const backdrop = document.createElement('div');
      backdrop.style.cssText = 'position:absolute;inset:0;background:rgba(0,0,0,0.82);pointer-events:all;';
      overlay.appendChild(backdrop);
      // Match status bar to dark overlay so it doesn't show as a black bar
      document.querySelector('meta[name="theme-color"]').content = '#151515';
    }
    // Gradient only on info steps — highlight steps already have a black overlay
    if (step.type === 'info') {
      const grad = document.createElement('div');
      grad.className = 'tutorial-gradient';
      overlay.appendChild(grad);
    }
    document.body.appendChild(overlay);

    if (step.type === 'tap-tab') {
      const tabBar    = document.getElementById('tab-bar');
      const targetTab = document.getElementById(step.tabId);
      if (tabBar) tabBar.style.zIndex = '301';
      document.querySelectorAll('.tab-btn').forEach(b => {
        if (b.id !== step.tabId) b.style.pointerEvents = 'none';
      });
      if (targetTab) {
        const rect = targetTab.getBoundingClientRect();
        const hint = document.createElement('div');
        hint.style.cssText = `position:fixed;left:${Math.round(rect.left + rect.width / 2)}px;bottom:${Math.round(window.innerHeight - rect.top + 12)}px;transform:translateX(-50%);z-index:302;text-align:center;color:#fff;pointer-events:none;`;
        hint.innerHTML = `<div style="font-size:0.78rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;white-space:nowrap;margin-bottom:8px;">Tap ${step.label}</div><div style="font-size:1.6rem;line-height:1">↓</div>`;
        overlay.appendChild(hint);
        targetTab.addEventListener('click', () => {
          s.tutorialStep++;
          requestAnimationFrame(() => renderTutorial());
        }, { once: true });
      }
    }

    if (step.type === 'tap-el') {
      const el = document.getElementById(step.elId);
      if (el) {
        el.style.position = 'relative';
        el.style.zIndex   = '301';
        const rect = el.getBoundingClientRect();
        const cx   = Math.round(rect.left + rect.width / 2);
        const topY = Math.round(rect.bottom + 12);
        // Arrow: centered directly under the element, position unchanged
        const arrow = document.createElement('div');
        arrow.style.cssText = `position:fixed;left:${cx}px;top:${topY}px;transform:translateX(-50%);z-index:302;color:#fff;pointer-events:none;font-size:1.6rem;line-height:1;`;
        arrow.textContent = '↑';
        overlay.appendChild(arrow);
        // Label: right edge flush with arrow centre (extends leftward, never clips right)
        const lbl = document.createElement('div');
        lbl.style.cssText = `position:fixed;left:${cx}px;top:${topY + 34}px;transform:translateX(calc(-100% + 12px));z-index:302;color:#fff;pointer-events:none;font-size:0.78rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;white-space:nowrap;`;
        lbl.textContent = `Tap ${step.label}`;
        overlay.appendChild(lbl);
        el.addEventListener('click', () => {
          s.tutorialStep++;
          requestAnimationFrame(() => renderTutorial());
        }, { once: true });
      }
    }

    if (step.type === 'info' || step.type === 'highlight') {
      if (step.type === 'highlight') {
        const el = document.getElementById(step.elId);
        if (el) {
          el.style.position      = 'relative';
          el.style.zIndex        = '301';
          el.style.pointerEvents = 'none';
          setTimeout(() => el.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
        }
      }
      const box = document.createElement('div');
      box.className = 'tutorial-box';
      box.innerHTML = `<div class="tutorial-title">${step.title}</div><button id="btn-tutorial-cta" class="btn-primary">${step.finish ? 'Finish' : 'Next'}</button>`;
      overlay.appendChild(box);
      document.getElementById('btn-tutorial-cta')?.addEventListener('click', () => {
        if (step.finish) { completeTutorial(); return; }
        s.tutorialStep++;
        renderTutorial();
      });
    }
  }

  function graceCompleteTask(taskId) {
    const pending = s.sessions.find(x => x.date !== s.today && x.status === 'active');
    if (!pending) return;
    const newCompleted = [...new Set([...(pending.completed_ids || []), taskId])];
    s.sessions = s.sessions.map(x => x.id === pending.id ? { ...x, completed_ids: newCompleted } : x);
    s.reviewDeclined = s.reviewDeclined.filter(id => id !== taskId);
    render();
  }

  function graceDeclineTask(taskId) {
    if (!s.reviewDeclined.includes(taskId)) s.reviewDeclined.push(taskId);
    render();
  }

  async function submitGrace() {
    const pending = s.sessions.find(x => x.date !== s.today && x.status === 'active');
    if (!pending) return;
    const tasks = (pending.picked_ids || []).map(id => getTaskForHistory(pending, id)).filter(Boolean);
    const completedIds = pending.completed_ids || [];
    const allCompleted = completedIds.length === tasks.length && tasks.length > 0;
    let earnedCommon = 0, earnedLegendary = 0, earnedMythic = 0;
    if (allCompleted) {
      if (tasks.length === 5) earnedMythic = 1;
      for (const id of completedIds) {
        const t = getTaskForHistory(pending, id);
        if (t?.type === 'legendary') earnedLegendary++; else earnedCommon++;
      }
    }
    s.pendingReward = { common: earnedCommon, legendary: earnedLegendary, mythic: earnedMythic };
    s.overlayScreen = allCompleted ? 'reward' : 'bad-luck';
    s.reviewDeclined = [];
    s.graceConfirmTask = null;
    s.sessions = s.sessions.map(x => x.id === pending.id
      ? { ...x, completed_ids: completedIds, status: 'done' } : x);
    render();
    await api('PATCH', '/api/sessions', { id: pending.id, completed_ids: completedIds, status: 'done' });
  }

  async function saveWallet() {
    await api('PATCH', '/api/wallet', {
      common: s.wallet.common,
      legendary: s.wallet.legendary,
      mythic: s.wallet.mythic,
      last_purchase_date: s.lastPurchaseDate,
      last_purchase_item_name: s.lastPurchasedItem?.name || null,
      last_purchase_item_rarity: s.lastPurchasedItem?.rarity || null,
    });
  }

  async function purchaseItem(itemId) {
    const activeItems = s.storeItems.length ? s.storeItems : STORE_ITEMS;
    const item = activeItems.find(x => x.id === itemId);
    if (!item) return;
    if (s.lastPurchaseDate === s.today) return;
    if ((s.wallet[item.rarity] || 0) < item.cost) return;
    s.wallet[item.rarity] -= item.cost;
    s.lastPurchaseDate = s.today;
    s.lastPurchasedItem = { name: item.name, rarity: item.rarity };
    s.selectedStoreItem = null;
    s.showPurchasedScreen = true;
    render();
    await saveWallet();
  }

  async function resetEverything() {
    await api('POST', '/api/reset');
    // Tasks were deleted server-side; re-fetch so init re-seeds the correct defaults
    const data = await api('GET', '/api/init');
    s = initialState();
    s.loading = false;
    s.tasks = data.tasks;
    s.storeItems = data.storeItems;
    s.ftueScreen = 'splash';
    render();
  }

  async function restartDay() {
    const plan = activePlan();
    s.activePlanId = null;
    s.sessions = s.sessions.filter(x => x.id !== plan?.id);
    s.offered = [];
    s.picked = [];
    s.confirmTask = null;
    s.planBuildState = 'generate';
    render();
    if (plan) await api('DELETE', '/api/sessions', { id: plan.id });
  }


  /* ── Task pool actions ── */
  async function savePoolTask(task) {
    const isNew = !task.id;
    if (isNew) task.id = Date.now().toString();
    if (isNew) {
      s.tasks.push(task);
      s.wallet.legendary = Math.max(0, s.wallet.legendary - 1);
    } else {
      s.tasks = s.tasks.map(t => t.id === task.id ? task : t);
    }
    s.editingTask = null;
    s.confirmEditTask = null;
    s.poolEditMode = false;
    render();
    const saves = [api('POST', '/api/tasks', task)];
    if (isNew) saves.push(saveWallet());
    await Promise.all(saves);
  }

  async function archivePoolTask(id) {
    s.tasks = s.tasks.map(t => t.id === id ? { ...t, archived: true } : t);
    render();
    await api('PATCH', '/api/tasks', { id, archived: true });
  }

  async function restorePoolTask(id) {
    s.tasks = s.tasks.map(t => t.id === id ? { ...t, archived: false } : t);
    render();
    await api('PATCH', '/api/tasks', { id, archived: false });
  }

  async function deletePoolTask(id) {
    s.tasks = s.tasks.filter(t => t.id !== id);
    s.deletingTask = null;
    render();
    await api('DELETE', '/api/tasks', { id });
  }

  /* ── Load ── */
  async function load() {
    try {
      const data = await api('GET', '/api/init');
      s.sessions = data.sessions;

      if (data.wallet) {
        const w = data.wallet;
        s.wallet = { common: w.common, legendary: w.legendary, mythic: w.mythic };
        s.lastPurchaseDate = w.last_purchase_date || null;
        s.lastPurchasedItem = w.last_purchase_item_name
          ? { name: w.last_purchase_item_name, rarity: w.last_purchase_item_rarity }
          : null;
        s.showPurchasedScreen = w.last_purchase_date === todayStr() && !!w.last_purchase_item_name;
      } else {
        await saveWallet(); // seed wallet row for new user
      }

      if (data.settings) {
        RESET_HOUR = data.settings.reset_hour;
        s.today = todayStr();
        s.hasCompletedOnboarding   = data.settings.has_completed_onboarding   ?? false;
        s.onboardingRitualCount    = data.settings.onboarding_ritual_count    ?? 0;
        s.hasShownRecordTutorial   = data.settings.has_shown_record_tutorial  ?? false;
        s.hasShownBazaarTutorial   = data.settings.has_shown_bazaar_tutorial  ?? false;
      }

      if (data.storeItems.length > 0) s.storeItems = data.storeItems;

      s.tasks = data.tasks;
      s.loading = false;

      // Auto-fail stale active sessions outside grace period
      if (!isInGracePeriod()) {
        const stale = s.sessions.filter(x => x.status === 'active' && x.date !== s.today);
        if (stale.length) {
          s.sessions = s.sessions.map(x =>
            stale.find(st => st.id === x.id) ? { ...x, status: 'done', completed_ids: [] } : x);
          await Promise.all(stale.map(x =>
            api('PATCH', '/api/sessions', { id: x.id, completed_ids: [], status: 'done' })
          ));
        }
      }

      // Trigger FTUE splash for brand-new users (no non-draft sessions)
      if (!s.hasCompletedOnboarding && s.onboardingRitualCount === 0) {
        const hasRealSessions = s.sessions.some(x => x.status !== 'draft');
        if (!hasRealSessions) s.ftueScreen = 'splash';
      }

      const activeSess    = s.sessions.find(x => x.status === 'active' && x.date === s.today);
      const doneTodaySess = s.sessions.find(x => x.status === 'done' && x.date === s.today && (x.picked_ids||[]).length > 0);

      if (activeSess) {
        s.activePlanId = activeSess.id;
      } else if (doneTodaySess) {
        s.activePlanId = doneTodaySess.id;
      } else {
        const todaySess = s.sessions.find(x => x.date === s.today);
        if (todaySess?.offered_ids?.length) {
          s.offered = todaySess.offered_ids;
          s.planBuildState = 'pick';
        }
      }
      render();

      // Resume any tutorial that wasn't completed before app closed
      if (!s.ftueScreen) {
        if (s.onboardingRitualCount >= 1 && !s.hasShownRecordTutorial)
          setTimeout(() => startTutorial('record'), 800);
        else if (s.onboardingRitualCount >= 2 && !s.hasShownBazaarTutorial)
          setTimeout(() => startTutorial('bazaar'), 800);
      }
    } catch (err) {
      document.getElementById('app').innerHTML =
        `<div class="loading" style="color:var(--danger)">Failed to load.<br><small>${err.message}</small></div>`;
    }
  }

  // Tab listeners — attached once; tab-bar is inside #app-wrap so always in DOM
  document.querySelectorAll('.tab-btn').forEach(b =>
    b.addEventListener('click', () => { s.tab = b.dataset.tab; s.profileScreen = 'menu'; s.selectedStoreItem = null; s.storeScreen = 'store'; render(); }));

  // ── Clerk auth flow ──
  // With data-clerk-publishable-key, window.Clerk is a pre-configured singleton
  try {
    clerk = window.Clerk;
    await clerk.load();
  } catch (err) {
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('clerk-auth').innerHTML =
      `<div style="background:#fee2e2;border:1px solid #fca5a5;border-radius:12px;padding:16px;font-size:0.9rem;color:#dc2626;font-family:inherit">
        Auth failed: ${err.message}<br><small>Check Clerk allowed domains and env vars.</small>
      </div>`;
    throw err;
  }

  let appLoaded = false;
  let authMounted = false;

  function syncAuth() {
    if (clerk.user) {
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('app-wrap').style.display = '';
      if (!appLoaded) {
        appLoaded = true;
        render(); // show loading spinner immediately
        load();
      }
    } else {
      document.getElementById('auth-screen').style.display = 'flex';
      document.getElementById('app-wrap').style.display = 'none';
      if (appLoaded) {
        // User signed out — reset state for next login
        s = initialState();
        appLoaded = false;
      }
      if (!authMounted) {
        clerk.mountSignIn(document.getElementById('clerk-auth'), {
          routing: 'virtual',
          afterSignInUrl: window.location.origin,
          afterSignUpUrl: window.location.origin,
          appearance: {
            variables: {
              colorPrimary: '#363c69',
              fontFamily: '"Space Grotesk", sans-serif',
              borderRadius: '16px',
            },
          },
        });
        authMounted = true;
      }
    }
  }

  clerk.addListener(syncAuth);
  syncAuth();

  if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
</script>
</body>
</html>
