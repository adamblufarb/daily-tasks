            el.addEventListener('click', () => completeTutorial(), { once: true, capture: isTester });

      // Tester copy override for Record info slide
      const stepTitle = (isTester && s.tutorialFlow === 'record' && step.title === 'Eternal record of your Ritual glory')

      overlay.appendChild(box);

        s.tutorialStep++;

    if (!pending) return;
    const tasks = (pending.picked_ids || []).map(id => getTaskForHistory(pending, id)).filter(Boolean);
    const completedIds = pending.completed_ids || [];
    const allCompleted = completedIds.length === tasks.length && tasks.length > 0;
    let earnedCommon = 0, earnedLegendary = 0, earnedMythic = 0;
    if (allCompleted) {
      if (tasks.length === 5) earnedMythic = 1;

      mythic: s.wallet.mythic,

      last_purchase_date: s.lastPurchaseDate,

      nickname: s.profile.nickname,

    });

  async function purchaseItem(itemId) {
    const activeItems = s.storeItems.length ? s.storeItems : STORE_ITEMS;
    const item = activeItems.find(x => x.id === itemId);
    if (!item) return;
    if (s.lastPurchaseDate === s.today) return;
    if ((s.wallet[item.rarity] || 0) < item.cost) return;
    s.wallet[item.rarity] -= item.cost;
    s.lastPurchaseDate = s.today;
    s.lastPurchasedItem = { name: item.name, rarity: item.rarity };
    s.selectedStoreItem = null;
    s.showPurchasedScreen = true;
    render();
    await saveWallet();
  }

  async function resetEverything() {
    await api('POST', '/api/reset');
    // Tasks were deleted server-side; re-fetch so init re-seeds the correct defaults
    const data = await api('GET', '/api/init');
    s = initialState();
    s.loading = false;
    s.tasks = data.tasks;
    s.storeItems = data.storeItems;
    s.ftueScreen = 'splash';
    render();
  }

  async function restartDay() {
    const plan = activePlan();
    s.activePlanId = null;
    s.sessions = s.sessions.filter(x => x.id !== plan?.id);
    s.offered = [];
    s.picked = [];
    s.confirmTask = null;
    s.planBuildState = 'generate';
    render();
    if (plan) await api('DELETE', '/api/sessions', { id: plan.id });
  }


  /* ── Task pool actions ── */
  async function savePoolTask(task) {
    const isNew = !task.id;
    if (isNew) task.id = Date.now().toString();
    if (isNew) {
      s.tasks.push(task);
    } else {
      s.tasks = s.tasks.map(t => t.id === task.id ? task : t);
    }
    s.wallet.legendary = Math.max(0, s.wallet.legendary - 1);
    s.editingTask = null;
    s.confirmEditTask = null;
    s.poolEditMode = false;
    s.poolAddMode = null;
    if (isNew) s.profileScreen = 'taskpool';
    render();
    if (isNew) {
      setTimeout(() => {
        const cardEl = document.querySelector(`[data-pool-task-id="${task.id}"]`);
        if (cardEl) {
          cardEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
          setTimeout(() => shineNewActCard(cardEl, task.type === 'legendary'), 350);
        }
      }, 50);
    }
    await Promise.all([api('POST', '/api/tasks', task), saveWallet()]);
  }

  function shineNewActCard(cardEl, isLegendary) {
    // Bounce: subtle spring at rest position (~1s), then shine
    cardEl.animate(
      [
        { transform: 'scale(1)',    offset: 0    },
        { transform: 'scale(1.04)', offset: 0.25 },
        { transform: 'scale(0.97)', offset: 0.55 },
        { transform: 'scale(1.02)', offset: 0.75 },
        { transform: 'scale(1)',    offset: 1    },
      ],
      { duration: 1000, easing: 'ease-out' }
    ).onfinish = () => {
      cardEl.style.overflow = 'hidden';
      const color = isLegendary ? 'rgba(196,113,45,0.55)' : 'rgba(153,157,166,0.55)';
      const ribbon = document.createElement('div');
      ribbon.style.cssText = `position:absolute;top:-20%;left:0;width:40%;height:140%;background:linear-gradient(to right,transparent,${color},transparent);transform:skewX(-25deg) translateX(-250%);pointer-events:none;z-index:5;`;
      cardEl.appendChild(ribbon);
      ribbon.animate(
        [{ transform: 'skewX(-25deg) translateX(-250%)' }, { transform: 'skewX(-25deg) translateX(420%)' }],
        { duration: 950, easing: 'ease-in-out', fill: 'forwards' }
      ).onfinish = () => {
        ribbon.remove();
        cardEl.style.overflow = '';
        if (isLegendary) legendaryGlowBurst(cardEl);
      };
    };
  }

  async function archivePoolTask(id) {
    s.tasks = s.tasks.map(t => t.id === id ? { ...t, archived: true } : t);
    render();
    await api('PATCH', '/api/tasks', { id, archived: true });
  }

  async function restorePoolTask(id) {
    s.tasks = s.tasks.map(t => t.id === id ? { ...t, archived: false } : t);
    render();
    await api('PATCH', '/api/tasks', { id, archived: false });
  }

  function deletePoolTask(id) {
    const cardEl = document.querySelector(`[data-pool-task-id="${id}"]`);

    const commit = () => {
      s.tasks = s.tasks.filter(t => t.id !== id);
      s.wallet.legendary = Math.max(0, s.wallet.legendary - 1);
      s.deletingTask = null;
      s.poolEditMode = false;
      render();
      Promise.all([api('DELETE', '/api/tasks', { id }), saveWallet()]);
    };

    if (!cardEl) { commit(); return; }

    // Phase 1: fade out (~700ms)
    cardEl.animate(
      [{ opacity: 1 }, { opacity: 0 }],
      { duration: 700, easing: 'ease-out', fill: 'forwards' }
    ).onfinish = () => {
      // Phase 2: collapse height so remaining cards slide up (~300ms)
      const h = cardEl.offsetHeight;
      cardEl.style.overflow = 'hidden';
      cardEl.animate(
        [{ height: h + 'px', marginBottom: '8px' }, { height: '0px', marginBottom: '0px' }],
        { duration: 300, easing: 'ease-in', fill: 'forwards' }
      ).onfinish = commit;
    };
  }

  /* ── Load ── */
  async function load() {
    try {
      const data = await api('GET', '/api/init');
      s.sessions = data.sessions;

      if (data.wallet) {
        const w = data.wallet;
        s.wallet = { common: w.common, legendary: w.legendary, mythic: w.mythic, streak: w.streak ?? 0, streakAwardClaimed: w.streak_award_claimed ?? 0 };
        s.lastPurchaseDate = w.last_purchase_date || null;
        s.lastPurchasedItem = w.last_purchase_item_name
          ? { name: w.last_purchase_item_name, rarity: w.last_purchase_item_rarity }
          : null;
        s.showPurchasedScreen = w.last_purchase_date === todayStr() && !!w.last_purchase_item_name;
      } else {
        await saveWallet(); // seed wallet row for new user
      }

      if (data.settings) {
        RESET_HOUR = data.settings.reset_hour;
        s.today = todayStr();
        s.hasCompletedOnboarding   = data.settings.has_completed_onboarding   ?? false;
        s.onboardingRitualCount    = data.settings.onboarding_ritual_count    ?? 0;
        s.hasShownRecordTutorial    = data.settings.has_shown_record_tutorial    ?? false;
        s.hasShownBazaarTutorial    = data.settings.has_shown_bazaar_tutorial   ?? false;
        s.hasShownActPoolTutorial   = data.settings.has_shown_actpool_tutorial  ?? false;
        s.hasShownKeyAffixTutorial  = data.settings.has_shown_key_affix_tutorial ?? false;
      }

      if (data.profile) {
        s.profile.nickname = data.profile.nickname || '';
        s.profile.hideFromLeaderboard = data.profile.hide_from_leaderboard || false;
        s.actFtueComplete = data.profile.act_ftue_complete ?? false;
      }

      if (data.storeItems.length > 0) s.storeItems = data.storeItems;

      s.tasks = data.tasks;
      s.loading = false;

      // Auto-fail stale active sessions outside grace period
      if (!isInGracePeriod()) {
        const stale = s.sessions.filter(x => x.status === 'active' && x.date !== s.today);
        if (stale.length) {
          s.sessions = s.sessions.map(x =>
            stale.find(st => st.id === x.id) ? { ...x, status: 'done', completed_ids: [] } : x);
          await Promise.all(stale.map(x =>
            api('PATCH', '/api/sessions', { id: x.id, completed_ids: [], status: 'done' })
          ));
        }
      }

      // Trigger FTUE splash for brand-new users (no non-draft sessions)
      if (!s.hasCompletedOnboarding && s.onboardingRitualCount === 0) {
        const hasRealSessions = s.sessions.some(x => x.status !== 'draft');
        if (!hasRealSessions && !s.actFtueComplete) s.ftueScreen = 'splash';
      }

      const activeSess    = s.sessions.find(x => x.status === 'active' && x.date === s.today);
      const doneTodaySess = s.sessions.find(x => x.status === 'done' && x.date === s.today && (x.picked_ids||[]).length > 0);

      if (activeSess) {
        s.activePlanId = activeSess.id;
      } else if (doneTodaySess) {
        s.activePlanId = doneTodaySess.id;
      } else {
        const todaySess = s.sessions.find(x => x.date === s.today);
        if (todaySess?.offered_ids?.length) {
          s.offered = todaySess.offered_ids;
          s.planBuildState = 'pick';
        }
      }
      render();

      // Resume any tutorial that wasn't completed before app closed
      if (!s.ftueScreen) {
        if (s.onboardingRitualCount >= 1 && !s.hasShownRecordTutorial)
          setTimeout(() => startTutorial('record'), 800);
        else if (KEY_AFFIX_ENABLED && s.onboardingRitualCount >= 1 && s.hasShownRecordTutorial && !s.hasShownKeyAffixTutorial)
          setTimeout(() => startTutorial('keyaffix'), 800);
        else if (s.onboardingRitualCount >= 2 && !s.hasShownBazaarTutorial)
          setTimeout(() => startTutorial('bazaar'), 800);
      }
    } catch (err) {
      document.getElementById('app').innerHTML =
        `<div class="loading" style="color:var(--danger)">Failed to load.<br><small>${err.message}</small></div>`;
    }
  }

  // Tab listeners — attached once; tab-bar is inside #app-wrap so always in DOM
  document.querySelectorAll('.tab-btn').forEach(b =>
    b.addEventListener('click', () => { s.tab = b.dataset.tab; s.profileScreen = 'menu'; s.selectedStoreItem = null; s.storeScreen = 'store'; s.leaderboardOpen = false; render(); }));

  // Tester reset button — wipes tasks + onboarding state so the app looks brand-new
  document.getElementById('btn-app-reset')?.addEventListener('click', async () => {
    await Promise.all([
      api('DELETE', '/api/tasks'),
      api('DELETE', '/api/sessions'),
      api('PATCH', '/api/settings', {
        has_completed_onboarding: false, onboarding_ritual_count: 0,
        has_shown_record_tutorial: false, has_shown_bazaar_tutorial: false,
        has_shown_actpool_tutorial: false, has_shown_key_affix_tutorial: false,
      }),
      api('PATCH', '/api/profile', { act_ftue_complete: false }),
      api('PATCH', '/api/wallet', {
        common: 0, legendary: 0, mythic: 0, streak: 0, streak_award_claimed: 0,
        last_purchase_date: null, last_purchase_item_name: null, last_purchase_item_rarity: null,
      }),
    ]);
    DATE_OFFSET = 0;
    localStorage.removeItem('date_offset');
    location.reload();
  });

  // ── Clerk auth flow ──
  // With data-clerk-publishable-key, window.Clerk is a pre-configured singleton
  try {
    clerk = window.Clerk;
    await clerk.load();
  } catch (err) {
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('clerk-auth').innerHTML =
      `<div style="background:#fee2e2;border:1px solid #fca5a5;border-radius:12px;padding:16px;font-size:0.9rem;color:#dc2626;font-family:inherit">
        Auth failed: ${err.message}<br><small>Check Clerk allowed domains and env vars.</small>
      </div>`;
    throw err;
  }

  let appLoaded = false;
  let authMounted = false;

  function syncAuth() {
    if (clerk.user) {
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('app-wrap').style.display = '';
      if (!appLoaded) {
        appLoaded = true;
        render(); // show loading spinner immediately
        load();
      }
    } else {
      document.getElementById('auth-screen').style.display = 'flex';
      document.getElementById('app-wrap').style.display = 'none';
      if (appLoaded) {
        // User signed out — reset state for next login
        s = initialState();
        appLoaded = false;
      }
      if (!authMounted) {
        clerk.mountSignIn(document.getElementById('clerk-auth'), {
          routing: 'virtual',
          afterSignInUrl: window.location.origin,
          afterSignUpUrl: window.location.origin,
          appearance: {
            variables: {
              colorPrimary: '#363c69',
              fontFamily: '"Space Grotesk", sans-serif',
              borderRadius: '16px',
            },
          },
        });
        authMounted = true;
      }
    }
  }

  clerk.addListener(syncAuth);
  syncAuth();

  // ── Centralized state evaluation ──
  // Called after claiming tokens, on visibility restore, on focus, every 60s,
  // and at exact reset/grace-end boundaries so the correct screen always shows.
  function evaluateState() {
    if (!appLoaded || s.loading) return;

    const newToday = todayStr();
    if (newToday !== s.today) {
      s.today = newToday;
      load(); // full refresh on new day
      return;
    }

    // Auto-fail any stale active sessions now that grace period has ended
    if (!isInGracePeriod()) {
      const stale = s.sessions.filter(x => x.status === 'active' && x.date !== s.today);
      if (stale.length) {
        s.sessions = s.sessions.map(x =>
          stale.find(st => st.id === x.id) ? { ...x, status: 'done', completed_ids: [] } : x
        );
        stale.forEach(x =>
          api('PATCH', '/api/sessions', { id: x.id, completed_ids: [], status: 'done' })
        );
        render();
      }
    }
  }

  // Schedules a one-shot timer to fire at the next significant boundary
  // (reset time or grace-end time), then reschedules itself.
  function scheduleNextBoundary() {
    const now = new Date();
    const elapsedMins = now.getHours() * 60 + now.getMinutes();
    const elapsedSecs = elapsedMins * 60 + now.getSeconds();
    const resetSecs    = RESET_HOUR * 3600;
    const graceEndSecs = (RESET_HOUR + GRACE_HOURS) * 3600;

    let secsUntilNext;
    if (elapsedSecs < resetSecs) {
      secsUntilNext = resetSecs - elapsedSecs;
    } else if (elapsedSecs < graceEndSecs) {
      secsUntilNext = graceEndSecs - elapsedSecs;
    } else {
      secsUntilNext = 86400 - elapsedSecs + resetSecs; // tomorrow's reset
    }

    setTimeout(() => {
      evaluateState();
      scheduleNextBoundary();
    }, Math.max(secsUntilNext * 1000, 1000));
  }

  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') evaluateState();
  });
  window.addEventListener('focus', evaluateState);
  setInterval(evaluateState, 60_000);
  scheduleNextBoundary();

  if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
</script>
</body>
</html>
